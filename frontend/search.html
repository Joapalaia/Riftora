<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Riftora — LoL Stats</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
* { cursor: none !important; }
:root{
  --bg:#070910;--panel:#0c0f1a;--card:#101422;--border:#1a2030;--border2:#222d42;
  --gold:#c8973a;--gold2:#e8b86d;--gold-glow:rgba(200,151,58,.15);
  --blue:#3d9de8;--win:#3ecf7a;--win-dim:rgba(62,207,122,.1);
  --loss:#e05252;--loss-dim:rgba(224,82,82,.1);
  --text:#d4c9b0;--text2:#9aa4b6;--text3:#5a6880;
  --head:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:17px;min-height:100vh;overflow-x:hidden;cursor:none;}

/* ── cursor — sem delay ── */
#cdot{
  position:fixed;width:18px;height:18px;
  background:var(--gold);border-radius:50%;
  pointer-events:none;z-index:99999;
  transform:translate(-50%,-50%);
  mix-blend-mode:screen;
  /* segue o mouse direto via JS, sem transition */
}
#cglow{
  position:fixed;width:340px;height:340px;border-radius:50%;
  pointer-events:none;z-index:99998;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(200,151,58,.07) 0%,rgba(61,157,232,.03) 45%,transparent 70%);
  /* glow também sem delay — suave mas imediato */
  transition:none;
}

/* grain */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:.5;}

/* ══════════════════════
   RESUME BANNER & RECENTES
══════════════════════ */
.resume-banner{
  width:100%;max-width:560px;
  background:rgba(200,151,58,.07);
  border:1px solid rgba(200,151,58,.25);
  border-radius:14px;padding:.9rem 1.2rem;
  display:flex;align-items:center;gap:1rem;
  margin-bottom:1.2rem;
  position:relative;z-index:1;
  animation:riseIn .6s cubic-bezier(.2,.8,.3,1) both;
  cursor:none;
}
.resume-banner::before{
  content:'';position:absolute;top:0;left:8%;right:8%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.35;
}
.resume-icon{font-size:1.6rem;flex-shrink:0;}
.resume-info{flex:1;min-width:0;}
.resume-name{font-family:var(--head);font-size:1.1rem;font-weight:800;letter-spacing:.02em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.resume-sub{font-size:.75rem;color:var(--text2);margin-top:.1rem;}
.resume-btn{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;border-radius:8px;color:#060810;
  font-family:var(--head);font-weight:800;font-size:.82rem;
  letter-spacing:.08em;text-transform:uppercase;
  padding:.4rem 1rem;cursor:none;transition:opacity .15s;flex-shrink:0;
}
.resume-btn:hover{opacity:.85;}
.resume-dismiss{
  background:transparent;border:none;color:var(--text3);
  font-size:1rem;cursor:none;padding:.2rem;transition:color .15s;flex-shrink:0;
  line-height:1;
}
.resume-dismiss:hover{color:var(--text2);}

.recentes-wrap{width:100%;max-width:560px;position:relative;z-index:1;margin-top:2rem;}
.recentes-label{
  font-family:var(--head);font-size:.68rem;letter-spacing:.16em;
  text-transform:uppercase;color:var(--text3);
  margin-bottom:.55rem;padding:0 .2rem;
}
.recentes-list{display:flex;flex-direction:column;gap:.4rem;}
.recente-item{
  display:flex;align-items:center;gap:.75rem;
  background:var(--panel);border:1px solid var(--border);border-radius:10px;
  padding:.55rem .9rem;cursor:none;transition:all .15s;
}
.recente-item:hover{border-color:rgba(200,151,58,.3);background:var(--card);}
.recente-icon{font-size:1rem;flex-shrink:0;opacity:.7;}
.recente-name{font-family:var(--head);font-size:.95rem;font-weight:700;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.recente-meta{font-size:.7rem;color:var(--text3);}
.recente-del{
  background:transparent;border:none;color:var(--text3);
  font-size:.85rem;cursor:none;padding:.1rem .3rem;
  transition:color .15s;line-height:1;
}
.recente-del:hover{color:var(--loss);}

/* ══════════════════════
   SEARCH
══════════════════════ */
.sw{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;position:relative;overflow:hidden;}
.sw::before{content:'';position:absolute;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:60px 60px;opacity:.22;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);}
.sw::after{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 50% 50%,rgba(200,151,58,.04) 0%,transparent 70%);}

.logo-mark{display:flex;flex-direction:column;align-items:center;margin-bottom:3rem;
  animation:riseIn .8s cubic-bezier(.2,.8,.3,1) both;position:relative;z-index:1;}
.logo-hex{width:72px;height:72px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--head);font-size:1.9rem;font-weight:900;color:#060810;
  margin-bottom:1.2rem;
  box-shadow:0 0 60px rgba(200,151,58,.4),0 0 120px rgba(200,151,58,.12);
  animation:hexFloat 4s ease-in-out infinite;}
@keyframes hexFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
.logo-name{font-family:var(--head);font-size:clamp(3rem,8vw,5.5rem);font-weight:900;
  letter-spacing:.08em;text-transform:uppercase;line-height:1;
  background:linear-gradient(135deg,var(--text) 0%,var(--gold2) 50%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-sub{font-size:.88rem;letter-spacing:.22em;text-transform:uppercase;color:var(--text3);margin-top:.5rem;}

.sc{background:var(--panel);border:1px solid var(--border);border-radius:18px;
  padding:2.5rem 2rem;width:100%;max-width:560px;
  box-shadow:0 40px 120px rgba(0,0,0,.7);
  position:relative;z-index:1;
  animation:riseIn .8s .1s cubic-bezier(.2,.8,.3,1) both;}
.sc::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4;}

.flbl{font-family:var(--head);font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--gold);margin-bottom:.55rem;display:flex;align-items:center;gap:.5rem;}
.flbl::before{content:'';display:inline-block;width:12px;height:1px;background:var(--gold);}

.frow{display:flex;gap:.75rem;align-items:stretch;}
.ibox{flex:1;display:flex;background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s,box-shadow .2s;}
.ibox:focus-within{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow);}
.ibox input{background:transparent;border:none;outline:none;color:var(--text);font-family:var(--body);font-size:1rem;padding:.85rem 1rem;flex:1;min-width:0;}
.ibox input::placeholder{color:var(--text3);}
.tsep{padding:0 .75rem;display:flex;align-items:center;color:var(--text3);font-size:1.1rem;border-left:1px solid var(--border);}
.tinp{width:80px;}
.bsearch{background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:10px;
  color:#060810;font-family:var(--head);font-weight:800;font-size:1.05rem;
  letter-spacing:.1em;text-transform:uppercase;
  padding:0 1.6rem;cursor:none;transition:opacity .15s,transform .1s;white-space:nowrap;flex-shrink:0;}
.bsearch:hover{opacity:.85;}.bsearch:active{transform:scale(.97);}.bsearch:disabled{opacity:.3;}

/* modo — 4 opções só */
.modo-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem;}
.pill{background:transparent;border:1px solid var(--border);border-radius:7px;
  color:var(--text2);font-family:var(--body);font-size:.82rem;
  padding:.35rem .8rem;cursor:none;transition:all .15s;}
.pill:hover{border-color:var(--border2);color:var(--text);}
.pill.on{border-color:var(--gold);color:var(--gold);background:var(--gold-glow);}

.region-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.5rem;}
.rpill{background:transparent;border:1px solid var(--border);border-radius:7px;
  color:var(--text2);font-family:var(--body);font-size:.8rem;
  padding:.3rem .7rem;cursor:none;transition:all .15s;}
.rpill:hover{border-color:var(--border2);color:var(--text);}
.rpill.on{border-color:var(--gold);color:var(--gold);background:var(--gold-glow);}

.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-top:1.2rem;}

.crow{display:flex;align-items:center;gap:.75rem;margin-top:.5rem;}
.cnum{font-family:var(--head);font-size:1.5rem;font-weight:700;color:var(--gold);min-width:3rem;}
input[type=range]{flex:1;-webkit-appearance:none;height:3px;background:var(--border);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--gold);cursor:none;box-shadow:0 0 8px rgba(200,151,58,.5);}
.ebar{margin-top:1rem;padding:.75rem 1rem;border-radius:8px;
  background:var(--loss-dim);border:1px solid rgba(224,82,82,.25);
  color:var(--loss);font-size:.88rem;text-align:center;}

/* ══════════════════════
   LOADER
══════════════════════ */
.lw{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;padding:2rem;}
.hpulse{width:60px;height:60px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  animation:pulse 1.3s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.25;transform:scale(.78);}}

.log-box{
  width:100%;max-width:440px;
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:1.2rem 1.4rem;
  font-family:var(--head);font-size:.85rem;letter-spacing:.06em;
  display:flex;flex-direction:column;gap:.55rem;
  position:relative;
}
.log-box::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.35;}

.log-line{display:flex;align-items:center;gap:.7rem;color:var(--text2);}
.log-line.done{color:var(--win);}
.log-line.active{color:var(--text);}
.log-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.log-line.done .log-dot{background:var(--win);}
.log-line.active .log-dot{background:var(--gold);animation:dotBlink .7s ease-in-out infinite;}
.log-line.wait .log-dot{background:var(--text3);}
@keyframes dotBlink{0%,100%{opacity:1;}50%{opacity:.2;}}

.log-elapsed{font-family:var(--head);font-size:.72rem;color:var(--text3);text-align:right;margin-top:.3rem;letter-spacing:.06em;}

/* ══════════════════════
   PROFILE LAYOUT — 3 colunas
══════════════════════ */
.proot{display:grid;grid-template-columns:300px 1fr;min-height:100vh;}

/* sidebar maestria */
.sbar{
  background:var(--panel);border-right:1px solid var(--border);
  position:sticky;top:0;height:100vh;overflow-y:auto;
  padding:1.8rem 1.1rem;
  display:flex;flex-direction:column;gap:.3rem;
}
.sbar::-webkit-scrollbar{width:3px;}
.sbar::-webkit-scrollbar-track{background:transparent;}
.sbar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.stitle{
  font-family:var(--head);font-size:.82rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--gold);text-align:center;
  padding:.5rem .4rem 1rem;border-bottom:1px solid var(--border);margin-bottom:.6rem;
}

.mi{
  display:flex;align-items:center;gap:.8rem;
  padding:.75rem .7rem;border-radius:10px;border:1px solid transparent;
  transition:all .18s;position:relative;overflow:hidden;
}
.mi:hover{background:var(--card);border-color:var(--border);}
.mrank{font-family:var(--head);font-size:.78rem;font-weight:700;color:var(--text3);min-width:18px;text-align:center;flex-shrink:0;}
.mimg{width:52px;height:52px;border-radius:9px;object-fit:cover;border:1px solid var(--border2);background:var(--border);flex-shrink:0;}
/* nome grandão + meta tudo na mesma linha */
.mrow{flex:1;min-width:0;display:flex;align-items:center;gap:.7rem;overflow:hidden;}
.mname{font-family:var(--head);font-size:1.2rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.02em;flex:1;line-height:1;}
.mmeta{font-family:var(--head);font-size:.78rem;color:var(--text2);white-space:nowrap;flex-shrink:0;}
.mmeta b{color:var(--gold);font-weight:800;}
.mbar{position:absolute;bottom:0;left:0;height:1px;background:linear-gradient(90deg,var(--gold),transparent);}

/* main — centralizado */
.mcont{
  padding:2rem 2.2rem 5rem;
  max-width:840px;
  width:100%;
  margin:0 auto;
}

/* nav */
.nbar{display:flex;align-items:center;gap:1rem;margin-bottom:2rem;}
.bbtn{background:transparent;border:1px solid var(--border);border-radius:8px;
  color:var(--text2);font-family:var(--head);font-size:.82rem;
  letter-spacing:.1em;text-transform:uppercase;
  padding:.45rem .9rem;cursor:none;transition:all .15s;}
.bbtn:hover{border-color:var(--gold);color:var(--gold);}
.ncrumb{font-family:var(--head);font-size:.86rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.ncrumb b{color:var(--gold);}

/* hero */
.hero{
  background:var(--panel);border:1px solid var(--border);border-radius:16px;
  padding:1.75rem 2rem;margin-bottom:1.25rem;
  display:grid;grid-template-columns:auto 1fr auto;gap:1.5rem;align-items:center;
  position:relative;overflow:hidden;
}
.hero::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold) 40%,var(--gold2) 60%,transparent);}
.hero::before{content:'';position:absolute;right:-40px;top:-40px;width:220px;height:220px;
  background:radial-gradient(circle,rgba(200,151,58,.06) 0%,transparent 70%);pointer-events:none;}

.icw{position:relative;}
.icimg{width:84px;height:84px;border-radius:12px;border:2px solid var(--border2);object-fit:cover;display:block;background:var(--border);}
.iclv{position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);
  background:var(--gold);color:#060810;
  font-family:var(--head);font-size:.65rem;font-weight:800;
  padding:2px 8px;border-radius:20px;white-space:nowrap;letter-spacing:.04em;}

.hname{font-family:var(--head);font-size:clamp(1.5rem,3vw,2.2rem);font-weight:900;
  letter-spacing:.02em;text-transform:uppercase;line-height:1;margin-bottom:.3rem;}
.htag{font-size:.9rem;color:var(--text2);}.htag b{color:var(--gold);}
.stk{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .65rem;border-radius:6px;
  font-family:var(--head);font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-top:.35rem;}
.stk.win{background:var(--win-dim);color:var(--win);border:1px solid rgba(62,207,122,.2);}
.stk.loss{background:var(--loss-dim);color:var(--loss);border:1px solid rgba(224,82,82,.2);}

.rblock{text-align:right;}
.rtier{font-family:var(--head);font-size:1.8rem;font-weight:900;letter-spacing:.04em;text-transform:uppercase;line-height:1;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.rlp{font-size:.86rem;color:var(--text2);margin-top:.2rem;}
.rrec{font-size:.82rem;color:var(--text2);margin-top:.12rem;}
.tpill{display:inline-flex;align-items:center;gap:.3rem;padding:.22rem .75rem;border-radius:99px;
  font-family:var(--head);font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-top:.4rem;}
.tpill.improving{background:var(--win-dim);color:var(--win);}
.tpill.declining{background:var(--loss-dim);color:var(--loss);}
.tpill.stable{background:rgba(61,157,232,.1);color:var(--blue);}

/* stat cards */
.srow{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:.9rem;margin-bottom:1.3rem;}
.scard{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1.15rem 1.1rem;}
.slbl{font-family:var(--head);font-size:.76rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:.3rem;}
.sval{font-family:var(--head);font-size:2rem;font-weight:800;letter-spacing:-.01em;line-height:1;}
.ssub{font-size:.82rem;color:var(--text2);margin-top:.2rem;}
.c-gold{color:var(--gold);}.c-blue{color:var(--blue);}.c-win{color:var(--win);}.c-loss{color:var(--loss);}.c-txt{color:var(--text);}
.wrbar{height:3px;background:var(--border);border-radius:99px;margin-top:.5rem;overflow:hidden;}
.wrfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--win),#6de8a4);transition:width 1s cubic-bezier(.4,0,.2,1);}

/* section */
.sec{display:flex;align-items:center;gap:.6rem;margin-bottom:.9rem;}
.sttl{font-family:var(--head);font-size:.82rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);}
.sline{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}

/* champ grid */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:.8rem;margin-bottom:1.3rem;}
.ccard{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:.88rem 1rem;display:flex;align-items:center;gap:.85rem;transition:border-color .2s,background .2s;}
.ccard:hover{border-color:var(--border2);background:var(--card);}
.cimg{width:48px;height:48px;border-radius:8px;object-fit:cover;border:1px solid var(--border2);background:var(--border);flex-shrink:0;}
.cinfo{flex:1;min-width:0;}
.cname{font-family:var(--head);font-size:1.1rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.15rem;letter-spacing:.02em;}
.cmeta{font-size:.82rem;color:var(--text2);display:flex;gap:.6rem;}
.ckda{color:var(--blue);font-weight:600;}
.cwr{font-family:var(--head);font-size:1.05rem;font-weight:800;flex-shrink:0;}

/* role */
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:.8rem;margin-bottom:1.3rem;}
.rcard{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1rem;}
.rname{font-family:var(--head);font-size:1.1rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;margin-bottom:.4rem;}
.rstats{display:flex;flex-direction:column;gap:.15rem;font-size:.82rem;color:var(--text2);}

/* evo */
.erow{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:1.3rem;}
.eblk{flex:1;min-width:90px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:.8rem;text-align:center;}
.erng{font-size:.68rem;color:var(--text2);margin-bottom:.3rem;font-family:var(--head);letter-spacing:.08em;text-transform:uppercase;}
.ewr{font-family:var(--head);font-size:1.2rem;font-weight:800;}
.esub{font-size:.72rem;color:var(--text2);margin-top:.12rem;}

/* hour */
.hchart{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1rem 1rem;margin-bottom:1.3rem;overflow-x:auto;}
.hbars{display:flex;align-items:flex-end;gap:3px;height:80px;min-width:480px;}
.hbw{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.hbar{width:100%;border-radius:3px 3px 0 0;transition:opacity .2s;min-height:3px;}.hbar:hover{opacity:.7;}
.hlbl{font-family:var(--head);font-size:.62rem;color:var(--text3);white-space:nowrap;transform:rotate(-45deg);}

/* matches */

<body>
<div id="cdot"></div>
<div id="cglow"></div>
<div id="root"></div>

<script>
// cursor — sem qualquer delay ou lerp, posição exata
const dot=document.getElementById('cdot'),glow=document.getElementById('cglow');
document.addEventListener('mousemove',e=>{
  dot.style.left=e.clientX+'px';dot.style.top=e.clientY+'px';
  glow.style.left=e.clientX+'px';glow.style.top=e.clientY+'px';

</script>

<script type="text/babel">
const {useState, useEffect, useRef} = React;

const API_BASE = "https://riftora-backend.onrender.com";

const REGIONS = [
  {id:"br1",label:"BR"},{id:"na1",label:"NA"},{id:"euw1",label:"EUW"},
  {id:"eune1",label:"EUNE"},{id:"kr",label:"KR"},{id:"lan1",label:"LAN"},
  {id:"las1",label:"LAS"},{id:"oc1",label:"OCE"},
];

// Apenas 4 modos
const MODES = [
  {id:"ranked_solo", label:"Ranked Solo"},
  {id:"ranked_flex", label:"Ranked Flex"},
  {id:"normal",      label:"Normal"},
  {id:"all",         label:"Todos"},
];

// Loading messages com tempos estimados em segundos
function getLoadingSteps(count) {
  const steps = [
    {msg:`Localizando invocador...`,        dur: 3},
    {msg:`Buscando dados de elo e level...`, dur: 4},
    {msg:`Carregando maestrias...`,          dur: 4},
  ];
  // estimativa: ~1.5s por partida nova (inclui timeline)
  const batches = Math.ceil(count / 20);
  for(let i = 0; i < batches; i++) {
    const from = i * 20 + 1;
    const to   = Math.min((i + 1) * 20, count);
    steps.push({msg:`Puxando partidas ${from}–${to} de ${count}...`, dur: 12});
  }
  steps.push({msg:`Calculando estatísticas...`, dur: 3});
  steps.push({msg:`Finalizando...`,              dur: 2});
  return steps;
}

// ── DDragon version (fetched at runtime) ──
let DDV = "14.24.1";  // fallback; atualizado dinamicamente

// Nomes de campeões que a API retorna diferente do arquivo local/DDragon
const CHAMP_FIX = {
  "Nunu & Willump":"Nunu","Renata Glasc":"Renata","Wukong":"MonkeyKing",
  "Bel'Veth":"Belveth","K'Sante":"KSante","Kog'Maw":"KogMaw","Kha'Zix":"Khazix",
  "Rek'Sai":"RekSai","Cho'Gath":"Chogath","Vel'Koz":"Velkoz",
  "Tahm Kench":"TahmKench","Lee Sin":"LeeSin","Master Yi":"MasterYi",
  "Miss Fortune":"MissFortune","Twisted Fate":"TwistedFate","Xin Zhao":"XinZhao",
  "Jarvan IV":"JarvanIV","Dr. Mundo":"DrMundo","Aurelion Sol":"AurelionSol",
  "Fiddlesticks":"Fiddlesticks",  // API às vezes retorna variações
};
function champFile(n){ return CHAMP_FIX[n] || n; }

// Mapa nome_ptBR → URL completa da imagem (preenchido ao carregar DDragon)
const RUNE_IMG = {};   // {"Eletrocutar": "https://ddragon.../Electrocute.png", ...}

// Carrega runas do DDragon em pt_BR + en_US e monta o mapa nome→URL
async function loadRuneImages() {
  try {
    // Pega versão atual
    const vRes = await fetch("https://ddragon.leagueoflegends.com/api/versions.json");
    const versions = await vRes.json();
    DDV = versions[0];

    // Busca en_US (tem o icon path) e pt_BR (tem o nome traduzido)
    const [enRes, ptRes] = await Promise.all([
      fetch(`https://ddragon.leagueoflegends.com/cdn/${DDV}/data/en_US/runesReforged.json`),
      fetch(`https://ddragon.leagueoflegends.com/cdn/${DDV}/data/pt_BR/runesReforged.json`),
    ]);
    const enData = await enRes.json();
    const ptData = await ptRes.json();

    // Monta mapa: índice em ptData corresponde ao mesmo índice em enData
    ptData.forEach((treePT, ti) => {
      const treeEN = enData[ti];
      // Estilo (ex: "Dominação" → icon do treeEN)
      RUNE_IMG[treePT.name] = `https://ddragon.leagueoflegends.com/cdn/img/${treeEN.icon}`;

      treePT.slots.forEach((slotPT, si) => {
        slotPT.runes.forEach((runePT, ri) => {
          const runeEN = treeEN.slots[si].runes[ri];
          RUNE_IMG[runePT.name] = `https://ddragon.leagueoflegends.com/cdn/img/${runeEN.icon}`;
        });
      });
    });
  } catch(e) {
    console.warn("Falha ao carregar runas do DDragon:", e);
  }
}

// Inicia o carregamento imediatamente
const runeLoadPromise = loadRuneImages();

const A = {
  champ: n  => `assets/champions/${champFile(n)}.png`,
  item:  id => `assets/items/${id}.png`,
  rune:  n  => RUNE_IMG[n] || `assets/runes/${n}.png`,
  icon:  id => `https://ddragon.leagueoflegends.com/cdn/${DDV}/img/profileicon/${id}.png`,
};
const DD = {
  champ: n  => `https://ddragon.leagueoflegends.com/cdn/${DDV}/img/champion/${champFile(n)}.png`,
  item:  id => `https://ddragon.leagueoflegends.com/cdn/${DDV}/img/item/${id}.png`,
};

function Img({src, fallback, ...p}) {
  return <img src={src} onError={e=>{ if(fallback && e.target.src !== fallback) e.target.src = fallback; }} {...p}/>;
}

function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    if(!ref.current) return;
    const obs = new IntersectionObserver(es => {
      es.forEach(e => { if(e.isIntersecting){ e.target.classList.add('vis'); obs.unobserve(e.target); }});
    }, {threshold: 0.08});
    ref.current.querySelectorAll('.rev').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
  return ref;
}

// ══════════════════════
// LOADER com log animado
// ══════════════════════
function Loader({count}) {
  const steps = getLoadingSteps(count);
  const [activeIdx, setActiveIdx] = useState(0);
  const [elapsed, setElapsed]     = useState(0);

  // avança os steps baseado no tempo estimado
  useEffect(() => {
    let idx = 0;
    function advance() {
      if(idx >= steps.length - 1) return;
      const delay = (steps[idx].dur || 4) * 1000;
      setTimeout(() => { idx++; setActiveIdx(idx); advance(); }, delay);
    }
    advance();
  }, []);

  // contador de tempo
  useEffect(() => {
    const t = setInterval(() => setElapsed(e => e + 1), 1000);
    return () => clearInterval(t);
  }, []);

  const mins = Math.floor(elapsed / 60);
  const secs = String(elapsed % 60).padStart(2, '0');

  return (
    <div className="lw">
      <div className="hpulse"/>
      <div className="log-box">
        {steps.map((s, i) => {
          const state = i < activeIdx ? 'done' : i === activeIdx ? 'active' : 'wait';
          return (
            <div key={i} className={`log-line ${state}`}>
              <div className="log-dot"/>
              <span>{s.msg}</span>
            </div>
          );
        })}
        <div className="log-elapsed">{mins > 0 ? `${mins}m ` : ''}{secs}s</div>
      </div>
    </div>
  );
}

// ══════════════════════
// SEARCH PAGE
// ══════════════════════
// ── localStorage helpers ──
function getRecents() {
  try { return JSON.parse(localStorage.getItem('riftora_recents') || '[]'); } catch { return []; }
}
function saveRecent(entry) {
  try {
    let list = getRecents().filter(r => !(r.name===entry.name && r.tag===entry.tag));
    list.unshift(entry);
    list = list.slice(0, 5);
    localStorage.setItem('riftora_recents', JSON.stringify(list));
  } catch {}
}
function removeRecent(name, tag) {
  try {
    const list = getRecents().filter(r => !(r.name===name && r.tag===tag));
    localStorage.setItem('riftora_recents', JSON.stringify(list));
  } catch {}
}

function SearchPage({onSearch}) {
  const [name,   setName]   = useState("");
  const [tag,    setTag]    = useState("");
  const [region, setRegion] = useState("br1");
  const [mode,   setMode]   = useState("ranked_solo");
  const [count,  setCount]  = useState(20);
  const [error,  setError]  = useState("");
  const [recents, setRecents] = useState(() => getRecents());

  // check if there's an active session to resume
  const resumeData = (() => {
    try {
      const rd = sessionStorage.getItem('rd');
      const rv = sessionStorage.getItem('rv');
      if(rd && rv === 'profile') {
        const d = JSON.parse(rd);
        return { name: d.player.game_name, tag: d.player.tag_line };
      }
    } catch {}
    return null;
  })();
  const [showResume, setShowResume] = useState(!!resumeData);

  function go(n, t, reg, mod, cnt) {
    const nm = n || name, tg = t || tag;
    if(!nm.trim() || !tg.trim()){ setError("Preencha o nome e a tag."); return; }
    setError("");
    saveRecent({ name: nm.trim(), tag: tg.trim(), region: reg||region, mode: mod||mode, count: cnt||count });
    setRecents(getRecents());
    onSearch(nm.trim(), tg.trim(), reg||region, mod||mode, cnt||count);
  }

  function handleDelRecent(e, n, t) {
    e.stopPropagation();
    removeRecent(n, t);
    setRecents(getRecents());
  }

  const modeLabel = id => MODES.find(m=>m.id===id)?.label || id;
  const regionLabel = id => REGIONS.find(r=>r.id===id)?.label || id;

  return (
    <div className="sw">
      <div className="logo-mark">
        <div className="logo-hex">R</div>
        <div className="logo-name">Riftora</div>
        <div className="logo-sub">League of Legends · Statistics</div>
      </div>

      {/* resume banner */}
      {showResume && resumeData && (
        <div className="resume-banner">
          <div className="resume-icon">⚡</div>
          <div className="resume-info">
            <div className="resume-name">{resumeData.name}<span style={{color:'var(--text3)',fontWeight:400}}>#{resumeData.tag}</span></div>
            <div className="resume-sub">Sessão ativa — continuar de onde parou</div>
          </div>
          <button className="resume-btn" onClick={()=>window.location.href='/escolher'}>Continuar →</button>
          <button className="resume-dismiss" onClick={()=>{
            sessionStorage.removeItem('rd'); sessionStorage.removeItem('rv'); setShowResume(false);
          }}>✕</button>
        </div>
      )}

      <div className="sc">
        <div className="flbl">Invocador</div>
        <div className="frow">
          <div className="ibox">
            <input type="text" placeholder="GameName" value={name}
              onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()}/>
            <div className="tsep">#</div>
            <input className="tinp" type="text" placeholder="TAG" value={tag}
              onChange={e=>setTag(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} maxLength={6}/>
          </div>
          <button className="bsearch" onClick={()=>go()}>Buscar</button>
        </div>

        <div className="opts-grid">
          <div>
            <div className="flbl" style={{marginTop:".2rem"}}>Região</div>
            <div className="region-row">
              {REGIONS.map(r => (
                <button key={r.id} className={`rpill${region===r.id?" on":""}`} onClick={()=>setRegion(r.id)}>{r.label}</button>
              ))}
            </div>
          </div>
          <div>
            <div className="flbl" style={{marginTop:".2rem"}}>Modo</div>
            <div className="modo-row">
              {MODES.map(m => (
                <button key={m.id} className={`pill${mode===m.id?" on":""}`} onClick={()=>setMode(m.id)}>{m.label}</button>
              ))}
            </div>
          </div>
        </div>

        <div style={{marginTop:"1.2rem"}}>
          <div className="flbl">Partidas a buscar</div>
          <div className="crow">
            <span className="cnum">{count}</span>
            <input type="range" min={10} max={200} step={10} value={count} onChange={e=>setCount(+e.target.value)}/>
            <span style={{fontSize:".78rem",color:"var(--text3)"}}>200</span>
          </div>
        </div>

        {error && <div className="ebar">{error}</div>}
      </div>

      {/* recentes */}
      {recents.length > 0 && !showResume && (
        <div className="recentes-wrap">
          <div className="recentes-label">Recentes</div>
          <div className="recentes-list">
            {recents.map((r,i) => (
              <div key={i} className="recente-item" onClick={()=>go(r.name, r.tag, r.region, r.mode, r.count)}>
                <div className="recente-icon">🎮</div>
                <div style={{flex:1,minWidth:0}}>
                  <div className="recente-name">{r.name}<span style={{color:'var(--text3)',fontWeight:400,fontSize:'.85rem'}}>#{r.tag}</span></div>
                  <div className="recente-meta">{regionLabel(r.region)} · {modeLabel(r.mode)}</div>
                </div>
                <button className="recente-del" onClick={e=>handleDelRecent(e,r.name,r.tag)}>✕</button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════
// SIDEBAR — maestria
// ══════════════════════
function Sidebar({mastery}) {
  const top20  = (mastery||[]).slice(0, 20);
  const maxPts = top20[0]?.mastery_points || 1;
  return (
    <div className="sbar">
      <div className="stitle">Top 20 Maestria</div>
      {top20.map((m, i) => (
        <div className="mi" key={m.champion_id}>
          <div className="mrank">{i+1}</div>
          <Img className="mimg" src={A.champ(m.champion_name)} fallback={DD.champ(m.champion_name)} alt={m.champion_name}/>
          <div className="mrow">
            <div className="mname">{m.champion_name}</div>
            <div className="mmeta"><b>M{m.mastery_level}</b> · {(m.mastery_points/1000).toFixed(0)}k</div>
          </div>
          <div className="mbar" style={{width:`${(m.mastery_points/maxPts)*100}%`}}/>
        </div>
      ))}
    </div>
  );
}

// ══════════════════════
// PROFILE PAGE
// ══════════════════════
function ProfilePage({data, onBack}) {
  const {player, mastery, matches, analysis, meta} = data;
  const ref = useReveal();
  const [runesReady, setRunesReady] = useState(Object.keys(RUNE_IMG).length > 0);
  useEffect(() => {
    runeLoadPromise.then(() => setRunesReady(true));
  }, []);
  const p = player, r = p.ranked || {};
  const o = analysis?.overall || {};
  const streak = analysis?.streak;
  const evo    = analysis?.evolution;
  const byRole = analysis?.by_role  || [];
  const byHour = analysis?.by_hour  || [];
  const byChamp= analysis?.by_champion || [];

  const wr = o.winrate ?? 0;
  const wc = wr >= 55 ? "c-win" : wr < 45 ? "c-loss" : "c-txt";
  const tierLabel = r.tier ? `${r.tier} ${r.rank}` : "UNRANKED";

  return (
    <div className="proot">
      <Sidebar mastery={mastery}/>

      <div className="mcont" ref={ref}>

        {/* nav */}
        <div className="nbar rev">
          <button className="bbtn" onClick={onBack}>← Voltar</button>
          <span className="ncrumb">
            <b>{p.game_name}</b>#{p.tag_line} · {meta?.region?.toUpperCase()} · {MODES.find(m=>m.id===meta?.mode)?.label}
          </span>
        </div>

        {/* hero */}
        <div className="hero rev">
          <div className="icw">
            <img className="icimg" src={A.icon(p.profile_icon_id)}
              onError={e=>{e.target.style.background="var(--border)";}} alt="icon"/>
            <div className="iclv">Lv {p.summoner_level}</div>
          </div>
          <div>
            <div className="hname">{p.game_name}</div>
            <div className="htag">#{p.tag_line} · <b>{meta?.region?.toUpperCase()}</b></div>
            {streak?.count > 1 && (
              <span className={`stk ${streak.type}`}>
                {streak.count}× {streak.type==="win" ? "vitórias" : "derrotas"}
              </span>
            )}
          </div>
          <div className="rblock">
            <div className="rtier">{tierLabel}</div>
            {r.lp != null && <div className="rlp">{r.lp} LP</div>}
            {r.ranked_wins != null && <div className="rrec">{r.ranked_wins}W {r.ranked_losses}L</div>}
            {evo?.trend && (
              <div className={`tpill ${evo.trend}`}>
                {evo.trend==="improving" ? "↑ Melhorando" : evo.trend==="declining" ? "↓ Piorando" : "→ Estável"}
              </div>
            )}
          </div>
        </div>

        {/* stat cards */}
        <div className="srow">
          {[
            {l:"Win Rate",   v:`${wr}%`, s:`${o.wins??0}W ${o.losses??0}L`,              c:wc,        bar:true, bv:wr},
            {l:"KDA Médio",  v:o.avg_kda??"—", s:`${o.avg_kills}/${o.avg_deaths}/${o.avg_assists}`, c:"c-blue"},
            {l:"CS Médio",   v:o.avg_cs??"—",  s:"minions + jungle",                     c:"c-txt"},
            {l:"Dano Médio", v:o.avg_damage ? Math.round(o.avg_damage/1000)+"k" : "—",   s:"por partida", c:"c-gold"},
            {l:"Visão Média",v:o.avg_vision??"—", s:"vision score",                      c:"c-txt"},
            {l:"Duração",    v:o.avg_game_duration_min??"—", s:`${o.total_matches??0} partidas`, c:"c-txt", sfx:"min"},
          ].map((x,i)=>(
            <div className="scard rev" key={i} style={{transitionDelay:`${i*.06}s`}}>
              <div className="slbl">{x.l}</div>
              <div className={`sval ${x.c}`}>{x.v}{x.sfx&&<span style={{fontSize:"1.1rem"}}>{x.sfx}</span>}</div>
              {x.bar && <div className="wrbar"><div className="wrfill" style={{width:`${x.bv}%`}}/></div>}
              <div className="ssub">{x.s}</div>
            </div>
          ))}
        </div>

        {/* top champs */}
        {byChamp.length > 0 && <>
          <div className="sec rev"><div className="sttl">// Top Campeões</div><div className="sline"/></div>
          <div className="cgrid">
            {byChamp.slice(0,6).map((c,i) => {
              const wc = c.winrate>=55?"c-win":c.winrate<45?"c-loss":"c-txt";
              return (
                <div className="ccard rev" key={c.champion} style={{transitionDelay:`${i*.05}s`}}>
                  <Img className="cimg" src={A.champ(c.champion)} fallback={DD.champ(c.champion)} alt={c.champion}/>
                  <div className="cinfo">
                    <div className="cname">{c.champion}</div>
                    <div className="cmeta">
                      <span className="ckda">KDA {c.avg_kda}</span>
                      <span>{c.games} jogos</span>
                      <span>{c.avg_cs?.toFixed(0)} CS</span>
                    </div>
                  </div>
                  <div className={`cwr ${wc}`}>{c.winrate}%</div>
                </div>
              );
            })}
          </div>
        </>}

        {/* by role */}
        {byRole.length > 0 && <>
          <div className="sec rev"><div className="sttl">// Por Rota</div><div className="sline"/></div>
          <div className="rgrid">
            {byRole.map((r,i) => {
              const wc = r.winrate>=55?"c-win":r.winrate<45?"c-loss":"c-txt";
              return (
                <div className="rcard rev" key={r.role} style={{transitionDelay:`${i*.05}s`}}>
                  <div className="rname">{r.role}</div>
                  <div className={`sval ${wc}`} style={{fontSize:"1.45rem"}}>{r.winrate}%</div>
                  <div className="rstats">
                    <span>{r.games} jogos · {r.wins}W</span>
                    <span>CS {r.avg_cs?.toFixed(0)} · {r.avg_damage ? Math.round(r.avg_damage/1000)+"k" : "—"}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </>}

        {/* evolution */}
        {evo?.blocks?.length > 0 && <>
          <div className="sec rev"><div className="sttl">// Evolução</div><div className="sline"/></div>
          <div className="erow">
            {evo.blocks.map((b,i) => {
              const wc = b.winrate>=55?"c-win":b.winrate<45?"c-loss":"c-txt";
              return (
                <div className="eblk rev" key={b.block} style={{transitionDelay:`${i*.04}s`}}>
                  <div className="erng">{b.range}</div>
                  <div className={`ewr ${wc}`}>{b.winrate}%</div>
                  <div className="esub">KDA {b.avg_kda}</div>
                </div>
              );
            })}
          </div>
        </>}

        {/* by hour */}
        {byHour.length > 0 && <>
          <div className="sec rev"><div className="sttl">// Horário BRT</div><div className="sline"/></div>
          <div className="hchart rev">
            <div className="hbars">
              {byHour.map(h => {
                const max = Math.max(...byHour.map(x=>x.games));
                const bh  = max > 0 ? Math.max(4, (h.games/max)*74) : 4;
                const col = h.winrate>=55?"var(--win)":h.winrate<45?"var(--loss)":"var(--blue)";
                return (
                  <div className="hbw" key={h.hour} title={`${h.label} — ${h.games}j ${h.winrate}%WR`}>
                    <div className="hbar" style={{height:`${bh}px`,background:col}}/>
                    <div className="hlbl">{h.hour}h</div>
                  </div>
                );
              })}
            </div>
          </div>
        </>}

        {/* matches */}
        {matches?.length > 0 && <>
          <div className="sec rev"><div className="sttl">// Partidas Recentes</div><div className="sline"/></div>
          <div className="mlist">
            {matches.map((m,i) => {
              const kda = m.deaths===0 ? "Perfect" : ((m.kills+m.assists)/m.deaths).toFixed(2);
              const dur = m.time_played ? `${Math.floor(m.time_played/60)}:${String(m.time_played%60).padStart(2,"0")}` : "—";
              const res = m.win ? "win" : "loss";
              const items = Array.isArray(m.items) ? m.items : [];
              const runes = m.runes || {};
              return (
                <div className={`mcard ${res} rev`} key={i} style={{transitionDelay:`${i*.028}s`}}>
                  <Img className="mic" src={A.champ(m.champion_name)} fallback={DD.champ(m.champion_name)} alt={m.champion_name}/>
                  <div>
                    <div className="mch">
                      {m.champion_name}
                      {m.role && <span className="rbadge">{m.role}</span>}
                    </div>
                    <div className="minf">{dur} · {m.cs_total} CS · {m.damage_dealt ? Math.round(m.damage_dealt/1000)+"k dano" : "—"}</div>
                    <div className="mitems">
                      {items.slice(0,6).map((it,j) =>
                        it ? <Img key={j} className="iic" src={A.item(it.id)} fallback={DD.item(it.id)} alt={it.name} title={it.name}/>
                           : <div key={j} className="iemp"/>
                      )}
                    </div>
                    {runes.primary_perks && runesReady && (
                      <div className="rrow">
                        {runes.primary_perks.slice(0,1).map((rn,j) =>
                          rn && rn !== "Unknown"
                            ? <img key={j} className="ric" src={A.rune(rn)} alt={rn} title={rn} onError={e=>{e.target.style.opacity=.2;}}/>
                            : null
                        )}
                        <span style={{fontSize:".78rem",color:"var(--text2)"}}>{runes.primary_style} · {runes.secondary_style}</span>
                      </div>
                    )}
                  </div>
                  <div className="kdab">
                    <div className="kdas">{m.kills}/{m.deaths}/{m.assists}</div>
                    <div className="kdar">{kda} KDA</div>
                  </div>
                  <div className={`mres ${res}`}>{m.win ? "Vitória" : "Derrota"}</div>
                </div>
              );
            })}
          </div>
        </>}

      </div>
    </div>
  );
}

// ══════════════════════
// APP
// ══════════════════════
function App() {
  const [view,    setView]   = useState(() => {
    try { return sessionStorage.getItem("rv") || "search"; } catch { return "search"; }
  });
  const [data,    setData]   = useState(() => {
    try { const d = sessionStorage.getItem("rd"); return d ? JSON.parse(d) : null; } catch { return null; }
  });
  const [loading, setLoading]= useState(false);
  const [count,   setCount]  = useState(20);
  const [error,   setError]  = useState("");

  async function handleSearch(name, tag, region, mode, cnt) {
    setCount(cnt);
    setLoading(true);
    setError("");
    try {
      const url = `${API_BASE}/search?name=${encodeURIComponent(name)}&tag=${encodeURIComponent(tag)}&region=${region}&mode=${mode}&matches=${cnt}`;
      const res = await fetch(url);
      const d   = await res.json();
      if(!res.ok) throw new Error(d.detail || "Erro desconhecido.");
      try { sessionStorage.setItem("rd", JSON.stringify(d)); sessionStorage.setItem("rv", "profile"); } catch {}
      setData(d);
      // redirect to mode selection page
      window.location.href = "/escolher";
    } catch(e) {
      setError(e.message);
    }
    setLoading(false);
  }

  function handleBack() {
    try { sessionStorage.removeItem("rd"); sessionStorage.removeItem("rv"); } catch {}
    setView("search");
  }

  if(loading) return <Loader count={count}/>;

  // Se já tem dados salvos, vai direto pro escolher
  if(view === "profile" && data) {
    window.location.replace("/escolher");
    return null;
  }

  return <SearchPage onSearch={handleSearch} initialError={error}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
