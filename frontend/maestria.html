<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Riftora · Maestria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080e;--panel:#0b0e18;--border:#181f30;--border2:#222d40;
  --gold:#c8973a;--gold2:#e8c46d;--gold3:#ffdd8a;
  --blue:#3d9de8;--win:#3ecf7a;
  --text:#e2d8c0;--text2:#8090a8;--text3:#3a4860;
  --head:'Bebas Neue',sans-serif;--sub:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;overflow-x:hidden;cursor:none;}

#cdot{position:fixed;width:7px;height:7px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);mix-blend-mode:screen;}
#cglow{position:fixed;width:360px;height:360px;border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(200,151,58,.07) 0%,transparent 70%);}

/* ── noise grain ── */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");opacity:.5;}

/* ── LOADING ── */
.loader{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;transition:opacity .6s,visibility .6s;}
.loader.hidden{opacity:0;visibility:hidden;}
.loader-hex{width:60px;height:60px;background:linear-gradient(135deg,var(--gold),var(--gold2));clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);animation:hexPulse 1.2s ease-in-out infinite;}
@keyframes hexPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.25;transform:scale(.75);}}
.loader-text{font-family:var(--sub);font-size:.9rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text2);}

/* ── HERO HEADER ── */
.hero-section{
  position:relative;min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;overflow:hidden;
  padding:2rem;
}

/* massive background champ silhouette */
.hero-bg-champ{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;overflow:hidden;
}
.hero-bg-img{
  width:70vmin;height:70vmin;object-fit:cover;
  filter:blur(1px) brightness(.15) saturate(.3);
  transform:scale(1.1);
  animation:heroFloat 8s ease-in-out infinite;
}
@keyframes heroFloat{0%,100%{transform:scale(1.1) translateY(0);}50%{transform:scale(1.12) translateY(-12px);}}

/* golden radial glow behind */
.hero-glow{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:80vmin;height:80vmin;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,rgba(200,151,58,.12) 0%,rgba(200,151,58,.04) 40%,transparent 70%);
}

.hero-content{position:relative;z-index:2;text-align:center;}

.hero-back{
  position:fixed;top:1.5rem;left:1.5rem;z-index:100;
  background:rgba(6,8,14,.8);border:1px solid var(--border);border-radius:8px;
  color:var(--text2);font-family:var(--sub);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;
  padding:.45rem .9rem;cursor:none;transition:all .15s;text-decoration:none;backdrop-filter:blur(10px);
}
.hero-back:hover{border-color:var(--gold);color:var(--gold);}

/* summoner info */
.summoner-icon-wrap{position:relative;display:inline-block;margin-bottom:1.5rem;}
.summoner-icon{
  width:96px;height:96px;border-radius:16px;
  border:2px solid rgba(200,151,58,.4);object-fit:cover;
  box-shadow:0 0 40px rgba(200,151,58,.2);
  animation:iconGlow 3s ease-in-out infinite;
}
@keyframes iconGlow{0%,100%{box-shadow:0 0 40px rgba(200,151,58,.2);}50%{box-shadow:0 0 60px rgba(200,151,58,.4);}}
.summoner-lv{
  position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
  background:var(--gold);color:#060810;
  font-family:var(--sub);font-size:.7rem;font-weight:800;
  padding:2px 10px;border-radius:20px;white-space:nowrap;letter-spacing:.06em;
}

.summoner-name{
  font-family:var(--head);
  font-size:clamp(2.5rem,8vw,5.5rem);
  letter-spacing:.06em;text-transform:uppercase;
  line-height:.95;
  background:linear-gradient(135deg,#fff 0%,var(--gold2) 50%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:nameIn 1s .3s cubic-bezier(.2,.8,.3,1) both;
}
@keyframes nameIn{from{opacity:0;letter-spacing:.2em;}to{opacity:1;letter-spacing:.06em;}}

.summoner-tag{font-family:var(--body);font-size:.9rem;color:var(--text2);margin-top:.3rem;}
.summoner-tag b{color:var(--gold);}

.hero-label{
  font-family:var(--sub);font-size:.75rem;letter-spacing:.22em;
  text-transform:uppercase;color:var(--text3);margin-top:1rem;
  animation:fadeIn 1s .6s both;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

.scroll-hint{
  position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:.5rem;
  animation:bounce 2s ease-in-out infinite;color:var(--text3);
  font-family:var(--sub);font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;
}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-6px);}}
.scroll-arrow{font-size:1.2rem;}

/* ── MASTERY SECTION ── */
.mastery-section{padding:3rem 1.5rem 6rem;max-width:900px;margin:0 auto;}

/* top 3 podium */
.podium{
  display:grid;grid-template-columns:1fr 1.2fr 1fr;
  gap:1rem;margin-bottom:3rem;align-items:end;
}

.podium-card{
  background:var(--panel);border:1px solid var(--border);border-radius:16px;
  overflow:hidden;position:relative;
  transition:transform .2s;cursor:default;
}
.podium-card:hover{transform:translateY(-4px);}

/* gold shimmer on #1 */
.podium-card.rank-1{
  border-color:rgba(200,151,58,.4);
  box-shadow:0 0 40px rgba(200,151,58,.12),0 0 1px rgba(200,151,58,.3);
}
.podium-card.rank-1::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent);
  animation:shimmer 2s linear infinite;
}
@keyframes shimmer{0%{background-position:-200%;}100%{background-position:200%;}}

.podium-card.rank-2,.podium-card.rank-3{
  border-color:rgba(255,255,255,.08);
}

.podium-img-wrap{
  position:relative;width:100%;padding-top:100%;overflow:hidden;
}
.podium-img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  transition:transform .4s;
}
.podium-card:hover .podium-img{transform:scale(1.05);}

.podium-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(6,8,14,.95) 0%,rgba(6,8,14,.4) 50%,transparent 100%);
}

.podium-rank{
  position:absolute;top:.75rem;left:.75rem;
  font-family:var(--head);font-size:2rem;letter-spacing:.02em;line-height:1;
}
.rank-1 .podium-rank{color:var(--gold3);}
.rank-2 .podium-rank{color:silver;}
.rank-3 .podium-rank{color:#cd7f32;}

.podium-info{padding:.9rem 1rem 1.1rem;}
.podium-name{font-family:var(--sub);font-size:1.2rem;font-weight:800;letter-spacing:.04em;margin-bottom:.3rem;}
.podium-meta{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}
.podium-lv{
  font-family:var(--sub);font-size:.72rem;font-weight:700;letter-spacing:.08em;
  padding:.15rem .55rem;border-radius:4px;
}
.rank-1 .podium-lv{background:rgba(200,151,58,.15);color:var(--gold);border:1px solid rgba(200,151,58,.25);}
.rank-2 .podium-lv{background:rgba(192,192,192,.1);color:silver;border:1px solid rgba(192,192,192,.2);}
.rank-3 .podium-lv{background:rgba(205,127,50,.1);color:#cd7f32;border:1px solid rgba(205,127,50,.2);}
.podium-pts{font-family:var(--sub);font-size:.8rem;color:var(--text2);}

/* pts bar */
.pts-bar{height:2px;background:var(--border);margin-top:.6rem;border-radius:1px;overflow:hidden;}
.pts-fill{height:100%;border-radius:1px;transition:width 1.5s cubic-bezier(.4,0,.2,1);}
.rank-1 .pts-fill{background:linear-gradient(90deg,var(--gold),var(--gold2));}
.rank-2 .pts-fill{background:linear-gradient(90deg,#a0a0a0,#d0d0d0);}
.rank-3 .pts-fill{background:linear-gradient(90deg,#a06030,#d09050);}

/* section title */
.sec-title{
  font-family:var(--head);font-size:1.5rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text2);margin-bottom:1.2rem;
  display:flex;align-items:center;gap:.7rem;
}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
.sec-title span{color:var(--gold);}

/* list items 4-50 */
.mastery-list{display:flex;flex-direction:column;gap:.5rem;}

.ml-item{
  display:grid;
  grid-template-columns:28px 48px 1fr auto;
  align-items:center;gap:.85rem;
  padding:.7rem .9rem;
  background:var(--panel);border:1px solid var(--border);border-radius:10px;
  transition:border-color .15s,background .15s;
  opacity:0;transform:translateY(12px);
  transition:border-color .15s,background .15s,opacity .4s,transform .4s;
}
.ml-item.vis{opacity:1;transform:translateY(0);}
.ml-item:hover{border-color:var(--border2);background:#0e1120;}

.ml-rank{font-family:var(--sub);font-size:.82rem;font-weight:700;color:var(--text3);text-align:center;}
.ml-img{width:48px;height:48px;border-radius:8px;object-fit:cover;border:1px solid var(--border2);background:var(--border);}
.ml-info{min-width:0;}
.ml-name{font-family:var(--sub);font-size:1rem;font-weight:700;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ml-bar-wrap{height:3px;background:var(--border);border-radius:1px;margin-top:.35rem;overflow:hidden;}
.ml-bar{height:100%;border-radius:1px;background:linear-gradient(90deg,rgba(200,151,58,.5),rgba(200,151,58,.2));transition:width 1s cubic-bezier(.4,0,.2,1);}
.ml-right{text-align:right;flex-shrink:0;}
.ml-lv{font-family:var(--sub);font-size:.82rem;font-weight:800;color:var(--gold);}
.ml-pts{font-family:var(--sub);font-size:.7rem;color:var(--text2);margin-top:.1rem;}

/* share button */
.share-wrap{text-align:center;margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border);}
.share-hint{font-family:var(--sub);font-size:.75rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:1rem;}
.btn-share{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;border-radius:10px;color:#060810;
  font-family:var(--sub);font-weight:800;font-size:1rem;letter-spacing:.1em;text-transform:uppercase;
  padding:.75rem 2rem;cursor:none;transition:opacity .15s,transform .1s;
}
.btn-share:hover{opacity:.85;}.btn-share:active{transform:scale(.97);}
</style>
</head>
<body>
<div id="cdot"></div>
<div id="cglow"></div>

<div class="loader" id="loader">
  <div class="loader-hex"></div>
  <div class="loader-text">Carregando maestrias...</div>
</div>

<a class="hero-back" href="index.html">← Voltar</a>

<!-- HERO -->
<section class="hero-section" id="heroSection">
  <div class="hero-bg-champ">
    <img class="hero-bg-img" id="heroBgImg" src="" alt=""/>
  </div>
  <div class="hero-glow"></div>

  <div class="hero-content">
    <div class="summoner-icon-wrap">
      <img class="summoner-icon" id="summonerIcon" src="" alt="icon"
        onerror="this.style.background='var(--border)'"/>
      <div class="summoner-lv" id="summonerLv">Lv —</div>
    </div>
    <div class="summoner-name" id="summonerName">—</div>
    <div class="summoner-tag" id="summonerTag"></div>
    <div class="hero-label">Campeões com maior maestria</div>
  </div>

  <div class="scroll-hint">
    <span class="scroll-arrow">↓</span>
    <span>Ver todos</span>
  </div>
</section>

<!-- MASTERY LIST -->
<section class="mastery-section">
  <div class="podium" id="podium"></div>
  <div class="sec-title"><span>#</span>4 – 50</div>
  <div class="mastery-list" id="masteryList"></div>

  <div class="share-wrap">
    <div class="share-hint">Tire um print e compartilhe!</div>
    <button class="btn-share" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Voltar ao topo</button>
  </div>
</section>

<script>
const DDV = "14.24.1";
const CHAMP_FIX = {
  "Nunu e Willump":"Nunu","Nunu & Willump":"Nunu","Renata Glasc":"Renata",
  "Wukong":"MonkeyKing","Bel'Veth":"Belveth","K'Sante":"KSante",
  "Kog'Maw":"KogMaw","Kha'Zix":"Khazix","Rek'Sai":"RekSai",
  "Cho'Gath":"Chogath","Vel'Koz":"Velkoz","Tahm Kench":"TahmKench",
  "Lee Sin":"LeeSin","Master Yi":"MasterYi","Miss Fortune":"MissFortune",
  "Twisted Fate":"TwistedFate","Xin Zhao":"XinZhao","Jarvan IV":"JarvanIV",
  "Dr. Mundo":"DrMundo","Aurelion Sol":"AurelionSol","FiddleSticks":"Fiddlesticks",
};
function champFile(n){return CHAMP_FIX[n]||n;}
function champImg(n){return `assets/champions/${champFile(n)}.png`;}
function champFallback(n){return `https://ddragon.leagueoflegends.com/cdn/${DDV}/img/champion/${champFile(n)}.png`;}
function iconImg(id){return `https://ddragon.leagueoflegends.com/cdn/${DDV}/img/profileicon/${id}.png`;}

// cursor
const dot=document.getElementById('cdot'),glow=document.getElementById('cglow');
document.addEventListener('mousemove',e=>{
  dot.style.left=e.clientX+'px';dot.style.top=e.clientY+'px';
  glow.style.left=e.clientX+'px';glow.style.top=e.clientY+'px';
});

// scroll reveal
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');observer.unobserve(e.target);}});
},{threshold:0.05});

function rankColor(i){
  if(i===0) return 'rank-1';
  if(i===1) return 'rank-2';
  if(i===2) return 'rank-3';
  return '';
}

function masLvColor(lv){
  if(lv>=10) return '#e8c46d';
  if(lv>=7)  return '#c8973a';
  if(lv>=5)  return '#a07830';
  return 'var(--text2)';
}

function render(data){
  const {player, mastery} = data;
  const top50 = (mastery||[]).slice(0,50);
  const maxPts = top50[0]?.mastery_points || 1;

  // summoner info
  document.getElementById('summonerIcon').src = iconImg(player.profile_icon_id);
  document.getElementById('summonerLv').textContent = `Lv ${player.summoner_level}`;
  document.getElementById('summonerName').textContent = player.game_name;
  document.getElementById('summonerTag').innerHTML = `<b>#${player.tag_line}</b>`;

  // hero bg = #1 champ
  if(top50[0]){
    const bg = document.getElementById('heroBgImg');
    bg.src = champImg(top50[0].champion_name);
    bg.onerror = ()=>{ bg.src = champFallback(top50[0].champion_name); };
  }

  // podium top 3
  const podium = document.getElementById('podium');
  const order = [1,0,2]; // silver, gold, bronze visual order
  order.forEach(idx => {
    if(!top50[idx]) return;
    const m = top50[idx];
    const rankClass = rankColor(idx);
    const pct = (m.mastery_points / maxPts * 100).toFixed(1);
    const div = document.createElement('div');
    div.className = `podium-card ${rankClass}`;
    div.innerHTML = `
      <div class="podium-img-wrap">
        <img class="podium-img" src="${champImg(m.champion_name)}"
          onerror="this.src='${champFallback(m.champion_name)}'" alt="${m.champion_name}"/>
        <div class="podium-overlay"></div>
        <div class="podium-rank">${idx+1}</div>
      </div>
      <div class="podium-info">
        <div class="podium-name">${m.champion_name}</div>
        <div class="podium-meta">
          <span class="podium-lv">M${m.mastery_level}</span>
          <span class="podium-pts">${(m.mastery_points/1000).toFixed(0)}k pts</span>
        </div>
        <div class="pts-bar"><div class="pts-fill" style="width:0" data-w="${pct}%"></div></div>
      </div>
    `;
    podium.appendChild(div);
  });

  // animate bars after a tick
  setTimeout(()=>{
    document.querySelectorAll('.pts-fill[data-w]').forEach(el=>{el.style.width=el.dataset.w;});
    document.querySelectorAll('.ml-bar[data-w]').forEach(el=>{el.style.width=el.dataset.w;});
  },100);

  // list 4-50
  const list = document.getElementById('masteryList');
  top50.slice(3).forEach((m,i)=>{
    const pct = (m.mastery_points / maxPts * 100).toFixed(1);
    const div = document.createElement('div');
    div.className = 'ml-item';
    div.innerHTML = `
      <div class="ml-rank">${i+4}</div>
      <img class="ml-img" src="${champImg(m.champion_name)}"
        onerror="this.src='${champFallback(m.champion_name)}'" alt="${m.champion_name}"/>
      <div class="ml-info">
        <div class="ml-name">${m.champion_name}</div>
        <div class="ml-bar-wrap"><div class="ml-bar" style="width:0" data-w="${pct}%"></div></div>
      </div>
      <div class="ml-right">
        <div class="ml-lv" style="color:${masLvColor(m.mastery_level)}">M${m.mastery_level}</div>
        <div class="ml-pts">${(m.mastery_points/1000).toFixed(0)}k</div>
      </div>
    `;
    list.appendChild(div);
    observer.observe(div);
    // stagger delay
    div.style.transitionDelay = `${i*0.03}s`;
  });

  // hide loader
  document.getElementById('loader').classList.add('hidden');

  // animate bars on visible items after short delay
  setTimeout(()=>{
    document.querySelectorAll('.ml-bar[data-w]').forEach(el=>{el.style.width=el.dataset.w;});
  },600);
}

// load data from sessionStorage
window.addEventListener('DOMContentLoaded',()=>{
  try{
    const raw = sessionStorage.getItem('rd');
    if(!raw){window.location.href='index.html';return;}
    const data = JSON.parse(raw);
    render(data);
  }catch(e){
    console.error(e);
    window.location.href='index.html';
  }
});
</script>
</body>
</html>
