<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Riftora · Maestria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
* { cursor: none !important; }
:root{
  --bg:#060810;--panel:#0b0e18;--border:#181f30;--border2:#222d40;
  --gold:#c8973a;--gold2:#e8c46d;--gold3:#ffdd8a;
  --blue:#3d9de8;--win:#3ecf7a;
  --text:#e2d8c0;--text2:#8090a8;--text3:#3a4860;
  --head:'Bebas Neue',sans-serif;--sub:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;overflow-x:hidden;cursor:none;}

#cdot{
  position:fixed;width:18px;height:18px;
  background:var(--gold);border-radius:50%;
  pointer-events:none;z-index:99999;
  transform:translate(-50%,-50%);
  mix-blend-mode:screen;
  box-shadow:0 0 8px rgba(200,151,58,.8);
}
#cglow{position:fixed;width:360px;height:360px;border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(200,151,58,.07) 0%,transparent 70%);}

body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");opacity:.5;}

/* ── LOADER ── */
.loader{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;transition:opacity .6s,visibility .6s;}
.loader.hidden{opacity:0;visibility:hidden;}
.loader-hex{width:60px;height:60px;background:linear-gradient(135deg,var(--gold),var(--gold2));clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);animation:hexPulse 1.2s ease-in-out infinite;}
@keyframes hexPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.25;transform:scale(.75);}}
.loader-text{font-family:var(--sub);font-size:1rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text2);}

/* nav */
.back-btn{
  position:fixed;top:1.5rem;left:1.5rem;z-index:100;
  background:rgba(6,8,14,.85);border:1px solid var(--border);border-radius:8px;
  color:var(--text2);font-family:var(--sub);font-size:.9rem;letter-spacing:.1em;text-transform:uppercase;
  padding:.5rem 1rem;cursor:none;transition:all .15s;text-decoration:none;backdrop-filter:blur(10px);
}
.back-btn:hover{border-color:var(--gold);color:var(--gold);}

/* ── HERO HEADER — tipográfico ── */
.hero-wrap{
  position:relative;
  padding:6rem 2rem 4rem;
  text-align:center;
  overflow:hidden;
}

/* subtle bg glow */
.hero-wrap::before{
  content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:600px;height:400px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(200,151,58,.06) 0%,transparent 70%);
  pointer-events:none;
}

/* horizontal lines decoration */
.hero-lines{
  position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden;
}
.hero-lines::before,.hero-lines::after{
  content:'';position:absolute;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,151,58,.15),transparent);
}
.hero-lines::before{top:40%;}
.hero-lines::after{bottom:30%;}

.hero-eyebrow{
  font-family:var(--sub);font-size:1rem;letter-spacing:.28em;text-transform:uppercase;
  color:var(--text3);margin-bottom:1rem;
  animation:fadeUp .7s .1s both;
}

.hero-name{
  font-family:var(--head);
  font-size:clamp(4rem,12vw,9rem);
  letter-spacing:.04em;text-transform:uppercase;line-height:.9;
  background:linear-gradient(135deg,#fff 10%,var(--gold2) 50%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:nameIn .9s .15s cubic-bezier(.2,.8,.3,1) both;
}
@keyframes nameIn{from{opacity:0;transform:translateY(24px);letter-spacing:.12em;}to{opacity:1;transform:translateY(0);letter-spacing:.04em;}}

.hero-sub{
  display:flex;align-items:center;justify-content:center;gap:1.2rem;
  margin-top:1.4rem;
  animation:fadeUp .7s .3s both;
}
.hero-icon{
  width:56px;height:56px;border-radius:10px;
  border:2px solid rgba(200,151,58,.3);object-fit:cover;
  box-shadow:0 0 20px rgba(200,151,58,.15);
  flex-shrink:0;
}
.hero-info{text-align:left;}
.hero-tag{font-family:var(--sub);font-size:1.1rem;color:var(--text2);}
.hero-tag b{color:var(--gold);}

/* LEVEL — gigante e intimidador */
.hero-lv-block{
  animation:fadeUp .7s .45s both;
  text-align:center;
  margin-top:1.8rem;
}
.hero-lv-label{
  font-family:var(--sub);font-size:.8rem;letter-spacing:.22em;text-transform:uppercase;
  color:var(--text3);margin-bottom:.2rem;
}
.hero-lv-num{
  font-family:var(--head);
  font-size:clamp(5rem,16vw,11rem);
  letter-spacing:-.02em;line-height:.85;
  background:linear-gradient(135deg,rgba(255,255,255,.9) 0%,var(--gold2) 40%,var(--gold) 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;
}

.hero-label{
  font-family:var(--sub);font-size:.9rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--text3);margin-top:2.5rem;
  animation:fadeUp .7s .5s both;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* ── TOP 3 PODIUM — tipográfico ── */
.podium-section{
  max-width:860px;margin:0 auto;
  padding:0 1.5rem 2rem;
}

.podium-grid{
  display:grid;grid-template-columns:1fr 1.1fr 1fr;
  gap:1rem;align-items:end;margin-bottom:2.5rem;
}

.pod-card{
  background:var(--panel);border:1px solid var(--border);
  border-radius:14px;padding:1.4rem 1.2rem 1.5rem;
  position:relative;overflow:hidden;
  transition:transform .2s;cursor:default;
}
.pod-card:hover{transform:translateY(-3px);}

.pod-card.r1{border-color:rgba(200,151,58,.3);box-shadow:0 0 30px rgba(200,151,58,.08);}
.pod-card.r1::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),transparent);}

.pod-num{
  font-family:var(--head);
  font-size:4rem;line-height:1;
  margin-bottom:.5rem;opacity:.15;
  position:absolute;top:.5rem;right:.8rem;
}
.r1 .pod-num{color:var(--gold3);opacity:.25;}
.r2 .pod-num{color:#d0d0d0;}
.r3 .pod-num{color:#cd7f32;}

/* small icon thumbnail */
.pod-thumb{
  width:48px;height:48px;border-radius:8px;object-fit:cover;
  border:1px solid var(--border2);background:var(--border);
  margin-bottom:.9rem;
  filter:saturate(.7) brightness(.85);
}
.pod-card:hover .pod-thumb{filter:saturate(1) brightness(1);}

.pod-champ{
  font-family:var(--head);font-size:1.8rem;letter-spacing:.04em;text-transform:uppercase;
  line-height:1;margin-bottom:.5rem;
}
.r1 .pod-champ{
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.pod-lv-badge{
  display:inline-block;font-family:var(--sub);font-size:.78rem;font-weight:800;
  letter-spacing:.08em;padding:.18rem .6rem;border-radius:4px;margin-bottom:.5rem;
}
.r1 .pod-lv-badge{background:rgba(200,151,58,.12);color:var(--gold);border:1px solid rgba(200,151,58,.25);}
.r2 .pod-lv-badge{background:rgba(192,192,192,.08);color:#b0b8c8;border:1px solid rgba(192,192,192,.15);}
.r3 .pod-lv-badge{background:rgba(160,96,48,.1);color:#c08050;border:1px solid rgba(160,96,48,.2);}

.pod-pts{font-family:var(--sub);font-size:.9rem;color:var(--text2);}

/* pts bar */
.pod-bar{height:3px;background:var(--border);border-radius:1px;margin-top:.8rem;overflow:hidden;}
.pod-fill{height:100%;border-radius:1px;transition:width 1.5s cubic-bezier(.4,0,.2,1);width:0;}
.r1 .pod-fill{background:linear-gradient(90deg,var(--gold),var(--gold2));}
.r2 .pod-fill{background:linear-gradient(90deg,#808898,#b0b8c8);}
.r3 .pod-fill{background:linear-gradient(90deg,#805030,#c08050);}

/* ── LIST 4-50 ── */
.list-section{max-width:860px;margin:0 auto;padding:0 1.5rem 5rem;}

.list-header{
  display:flex;align-items:center;gap:.8rem;margin-bottom:1.2rem;
}
.list-title{
  font-family:var(--head);font-size:1.6rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);
}
.list-title span{color:var(--gold);}
.list-divider{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}

.ml-list{display:flex;flex-direction:column;gap:.45rem;}

.ml-item{
  display:grid;
  grid-template-columns:36px 44px 1fr auto auto;
  align-items:center;gap:.9rem;
  padding:.8rem 1rem;
  background:var(--panel);border:1px solid var(--border);border-radius:10px;
  opacity:0;transform:translateX(-8px);
  transition:border-color .15s,background .15s,opacity .4s,transform .4s;
}
.ml-item.vis{opacity:1;transform:translateX(0);}
.ml-item:hover{border-color:var(--border2);background:#0e1120;}

.ml-num{
  font-family:var(--head);font-size:1.1rem;letter-spacing:.02em;
  color:var(--text3);text-align:center;line-height:1;
}
/* highlight top 10 */
.ml-item[data-rank="4"] .ml-num,
.ml-item[data-rank="5"] .ml-num,
.ml-item[data-rank="6"] .ml-num,
.ml-item[data-rank="7"] .ml-num,
.ml-item[data-rank="8"] .ml-num,
.ml-item[data-rank="9"] .ml-num,
.ml-item[data-rank="10"] .ml-num{color:rgba(200,151,58,.5);}

.ml-thumb{
  width:44px;height:44px;border-radius:7px;object-fit:cover;
  border:1px solid var(--border2);background:var(--border);
  filter:saturate(.6) brightness(.8);transition:filter .2s;flex-shrink:0;
}
.ml-item:hover .ml-thumb{filter:saturate(.9) brightness(.95);}

.ml-name{
  font-family:var(--head);font-size:1.3rem;letter-spacing:.03em;text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1;
}

.ml-bar-wrap{height:2px;background:var(--border);border-radius:1px;margin-top:.35rem;overflow:hidden;width:100%;max-width:200px;}
.ml-bar{height:100%;border-radius:1px;background:linear-gradient(90deg,rgba(200,151,58,.4),rgba(200,151,58,.1));transition:width 1.2s cubic-bezier(.4,0,.2,1);width:0;}

.ml-lv{
  font-family:var(--head);font-size:1.1rem;letter-spacing:.04em;
  color:var(--gold);flex-shrink:0;min-width:32px;text-align:right;
}

.ml-pts{
  font-family:var(--sub);font-size:.85rem;color:var(--text2);
  white-space:nowrap;flex-shrink:0;min-width:52px;text-align:right;
}

/* share footer */
.share-footer{
  text-align:center;padding:3rem 1.5rem;
  border-top:1px solid var(--border);max-width:860px;margin:0 auto;
}
.share-hint{font-family:var(--sub);font-size:.9rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);margin-bottom:1.2rem;}
.btn-top{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;border-radius:10px;color:#060810;
  font-family:var(--sub);font-weight:800;font-size:1rem;letter-spacing:.12em;text-transform:uppercase;
  padding:.8rem 2.2rem;cursor:none;transition:opacity .15s,transform .1s;
}
.btn-top:hover{opacity:.85;}.btn-top:active{transform:scale(.97);}
</style>
</head>
<body>
<div id="cdot"></div>
<div id="cglow"></div>

<div class="loader" id="loader">
  <div class="loader-hex"></div>
  <div class="loader-text">Carregando maestrias...</div>
</div>

<a class="back-btn" href="/escolher">← Voltar</a>

<!-- HERO -->
<div class="hero-wrap">
  <div class="hero-lines"></div>
  <div class="hero-eyebrow">Riftora · Maestria</div>
  <div class="hero-name" id="heroName">—</div>
  <div class="hero-sub">
    <img class="hero-icon" id="heroIcon" src="" alt="icon" onerror="this.style.opacity=.3"/>
    <div class="hero-info">
      <div class="hero-tag" id="heroTag"></div>
    </div>
  </div>
  <div class="hero-lv-block">
    <div class="hero-lv-label">Nível</div>
    <div class="hero-lv-num" id="heroLv">—</div>
  </div>
  <div class="hero-label">Top 50 Campeões com Maior Maestria</div>
</div>

<!-- PODIUM -->
<div class="podium-section">
  <div class="podium-grid" id="podium"></div>
</div>

<!-- LIST -->
<div class="list-section">
  <div class="list-header">
    <div class="list-title"><span>#</span>4 – 50</div>
    <div class="list-divider"></div>
  </div>
  <div class="ml-list" id="mlList"></div>
</div>

<div class="share-footer">
  <div class="share-hint">Tire um print e compartilhe!</div>
  <button class="btn-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Topo</button>
</div>

<script>
const DDV="14.24.1";
const CHAMP_FIX={"Nunu e Willump":"Nunu","Nunu & Willump":"Nunu","Renata Glasc":"Renata","Wukong":"MonkeyKing","Bel'Veth":"Belveth","K'Sante":"KSante","Kog'Maw":"KogMaw","Kha'Zix":"Khazix","Rek'Sai":"RekSai","Cho'Gath":"Chogath","Vel'Koz":"Velkoz","Tahm Kench":"TahmKench","Lee Sin":"LeeSin","Master Yi":"MasterYi","Miss Fortune":"MissFortune","Twisted Fate":"TwistedFate","Xin Zhao":"XinZhao","Jarvan IV":"JarvanIV","Dr. Mundo":"DrMundo","Aurelion Sol":"AurelionSol","FiddleSticks":"Fiddlesticks"};
function cf(n){return CHAMP_FIX[n]||n;}
function ci(n){return `assets/champions/${cf(n)}.png`;}
function cif(n){return `https://ddragon.leagueoflegends.com/cdn/${DDV}/img/champion/${cf(n)}.png`;}
function ii(id){return `https://ddragon.leagueoflegends.com/cdn/${DDV}/img/profileicon/${id}.png`;}

const dot=document.getElementById('cdot'),glow=document.getElementById('cglow');
document.addEventListener('mousemove',e=>{dot.style.left=e.clientX+'px';dot.style.top=e.clientY+'px';glow.style.left=e.clientX+'px';glow.style.top=e.clientY+'px';});

// scroll reveal
const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');obs.unobserve(e.target);}});},{threshold:0.04});

function masLvColor(lv){
  if(lv>=14)return'var(--gold3)';
  if(lv>=10)return'var(--gold2)';
  if(lv>=7) return'var(--gold)';
  if(lv>=5) return'#a07830';
  return'var(--text2)';
}

function render(data){
  const {player,mastery}=data;
  const top50=(mastery||[]).slice(0,50);
  const maxPts=top50[0]?.mastery_points||1;

  // hero
  document.getElementById('heroName').textContent=player.game_name;
  document.getElementById('heroIcon').src=ii(player.profile_icon_id);
  document.getElementById('heroTag').innerHTML=`<b>#${player.tag_line}</b>`;
  document.getElementById('heroLv').textContent=player.summoner_level;

  // podium top 3 — visual order: #2, #1, #3
  const podium=document.getElementById('podium');
  [[1,'r2'],[0,'r1'],[2,'r3']].forEach(([idx,cls])=>{
    const m=top50[idx];
    if(!m)return;
    const pct=(m.mastery_points/maxPts*100).toFixed(1);
    const div=document.createElement('div');
    div.className=`pod-card ${cls}`;
    div.innerHTML=`
      <div class="pod-num">${idx+1}</div>
      <img class="pod-thumb" src="${ci(m.champion_name)}" onerror="this.src='${cif(m.champion_name)}'" alt="${m.champion_name}"/>
      <div class="pod-champ">${m.champion_name}</div>
      <span class="pod-lv-badge">Maestria ${m.mastery_level}</span>
      <div class="pod-pts">${(m.mastery_points/1000).toFixed(0)}k pontos</div>
      <div class="pod-bar"><div class="pod-fill" data-w="${pct}%"></div></div>
    `;
    podium.appendChild(div);
  });

  // animate podium bars
  setTimeout(()=>{
    document.querySelectorAll('.pod-fill[data-w]').forEach(el=>el.style.width=el.dataset.w);
  },150);

  // list 4-50
  const list=document.getElementById('mlList');
  top50.slice(3).forEach((m,i)=>{
    const rank=i+4;
    const pct=(m.mastery_points/maxPts*100).toFixed(1);
    const div=document.createElement('div');
    div.className='ml-item';
    div.dataset.rank=rank;
    div.style.transitionDelay=`${i*0.025}s`;
    div.innerHTML=`
      <div class="ml-num">${rank}</div>
      <img class="ml-thumb" src="${ci(m.champion_name)}" onerror="this.src='${cif(m.champion_name)}'" alt="${m.champion_name}"/>
      <div style="min-width:0">
        <div class="ml-name">${m.champion_name}</div>
        <div class="ml-bar-wrap"><div class="ml-bar" data-w="${pct}%"></div></div>
      </div>
      <div class="ml-lv" style="color:${masLvColor(m.mastery_level)}">M${m.mastery_level}</div>
      <div class="ml-pts">${(m.mastery_points/1000).toFixed(0)}k</div>
    `;
    list.appendChild(div);
    obs.observe(div);
  });

  // animate list bars after items become visible
  setTimeout(()=>{
    document.querySelectorAll('.ml-bar[data-w]').forEach(el=>el.style.width=el.dataset.w);
  },800);

  document.getElementById('loader').classList.add('hidden');
}

window.addEventListener('DOMContentLoaded',()=>{
  try{
    const raw=sessionStorage.getItem('rd');
    if(!raw){window.location.href='/search';return;}
    render(JSON.parse(raw));
  }catch(e){window.location.href='/search';}
});
</script>
</body>
</html>
