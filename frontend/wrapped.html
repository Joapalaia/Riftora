<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Riftora · Wrapped</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
* { cursor: none !important; }
a, button, .music-btn, .back-btn { pointer-events: auto !important; }
:root{
  --head:'Bebas Neue',sans-serif;
  --sub:'Barlow Condensed',sans-serif;
  --body:'Barlow',sans-serif;
  --gold:#c8973a;--gold2:#e8c46d;--gold3:#fff0b0;
}
html,body{height:100%;overflow:hidden;background:#000;}

/* cursor */
#cdot{position:fixed;width:15px;height:15px;background:rgba(255,255,255,.9);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);mix-blend-mode:difference;}

/* grain overlay */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9000;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.6;}

/* ── PROGRESS BAR ── */
.progress{
  position:fixed;top:0;left:0;right:0;z-index:500;
  display:flex;gap:4px;padding:12px 16px;
}
.prog-seg{
  flex:1;height:3px;border-radius:2px;
  background:rgba(255,255,255,.2);overflow:hidden;
}
.prog-fill{height:100%;width:0%;background:#fff;border-radius:2px;transition:none;}
.prog-fill.done{width:100%;}
.prog-fill.active{width:100%;transition:width var(--slide-dur,6s) linear;}

/* ── BACK BTN ── */
.back-btn{
  position:fixed;top:1.4rem;left:1rem;z-index:500;
  background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.15);border-radius:8px;
  color:rgba(255,255,255,.7);font-family:var(--sub);font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;
  padding:.38rem .8rem;cursor:none;transition:all .15s;text-decoration:none;backdrop-filter:blur(8px);
}
.back-btn:hover{border-color:rgba(255,255,255,.4);color:#fff;}

/* ── SLIDES CONTAINER ── */
.slides{position:fixed;inset:0;z-index:1;}
.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .5s ease;
  overflow:hidden;
}
.slide.active{opacity:1;pointer-events:all;}
.slide.exit{opacity:0;}

/* click zones */
.click-prev{position:absolute;left:0;top:0;width:35%;height:100%;z-index:100;}
.click-next{position:absolute;right:0;top:0;width:65%;height:100%;z-index:100;}

/* ── SLIDE BACKGROUNDS ── */
.slide-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center top;
  transform:scale(1.05);
  transition:transform 8s ease;
}
.slide.active .slide-bg{transform:scale(1);}

.slide-overlay{position:absolute;inset:0;}

/* ── SLIDE CONTENT ── */
.slide-content{
  position:relative;z-index:150;
  width:100%;max-width:480px;
  padding:5rem 2.5rem 4rem;
  text-align:center;
}

/* ── TYPOGRAPHY SYSTEM ── */
.tag-line{
  font-family:var(--sub);font-size:.78rem;letter-spacing:.28em;text-transform:uppercase;
  margin-bottom:.8rem;opacity:.7;
}
.big-number{
  font-family:var(--head);
  font-size:clamp(5rem,22vw,9rem);
  line-height:.85;letter-spacing:.02em;
  animation:countUp .8s cubic-bezier(.2,.8,.3,1) both;
}
@keyframes countUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.big-title{
  font-family:var(--head);
  font-size:clamp(3rem,12vw,6rem);
  line-height:.9;letter-spacing:.04em;text-transform:uppercase;
  animation:slideUp .7s .1s cubic-bezier(.2,.8,.3,1) both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.subtitle{
  font-family:var(--sub);font-size:1.1rem;font-weight:300;letter-spacing:.08em;
  margin-top:.6rem;opacity:.8;
  animation:slideUp .7s .25s cubic-bezier(.2,.8,.3,1) both;
}
.body-text{
  font-family:var(--body);font-size:1rem;line-height:1.6;
  margin-top:.8rem;opacity:.75;
  animation:slideUp .7s .35s cubic-bezier(.2,.8,.3,1) both;
}
.highlight{font-weight:700;opacity:1;}

/* ── SLIDE 0: INTRO ── */
.s0-bg{background:#050508;}
.s0-hex{
  width:90px;height:90px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--head);font-size:2.4rem;color:#050508;
  margin:0 auto 1.5rem;
  box-shadow:0 0 80px rgba(200,151,58,.5);
  animation:hexIn 1s cubic-bezier(.2,.8,.3,1) both;
}
@keyframes hexIn{from{opacity:0;transform:scale(.5) rotate(-30deg);}to{opacity:1;transform:scale(1) rotate(0);}}
.s0-name{
  font-family:var(--head);
  font-size:clamp(1.4rem,7.5vw,5.5rem);
  letter-spacing:.04em;text-transform:uppercase;line-height:.9;
  color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:clip;
  max-width:100%;
  animation:nameReveal 1s .3s cubic-bezier(.2,.8,.3,1) both;
}
@keyframes nameReveal{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
.s0-sub{
  font-family:var(--sub);font-size:.9rem;letter-spacing:.22em;text-transform:uppercase;
  color:rgba(255,255,255,.4);margin-top:.8rem;
  animation:slideUp .7s .7s both;
}
.s0-hint{
  position:absolute;bottom:3rem;left:50%;transform:translateX(-50%);
  font-family:var(--sub);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.35);
  animation:pulse 2s 1.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.35;}50%{opacity:.7;}}
/* star particles for intro */
.stars{position:absolute;inset:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle linear infinite;}
@keyframes twinkle{0%,100%{opacity:0;}50%{opacity:1;}}

/* ── SLIDE 1: PARTIDAS ── */
.s1-overlay{background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.5) 60%,rgba(0,0,0,.2) 100%);}

/* ── SLIDE 2: CAMPEÃO ── */
.s2-champ-art{
  position:absolute;
  right:-5%;bottom:0;
  height:95%;
  object-fit:contain;object-position:top;
  opacity:.25;
  filter:blur(0px);
  animation:champIn 1.2s cubic-bezier(.2,.8,.3,1) both;
}
@keyframes champIn{from{opacity:0;transform:translateX(40px);}to{opacity:.25;transform:translateX(0);}}
.s2-content{position:relative;z-index:2;width:100%;padding:0 2.5rem;text-align:left;margin-top:auto;padding-bottom:4rem;}
.s2-label{font-family:var(--sub);font-size:.75rem;letter-spacing:.24em;text-transform:uppercase;opacity:.5;margin-bottom:.5rem;}
.s2-name{
  font-family:var(--head);
  font-size:clamp(4rem,16vw,8rem);
  line-height:.85;letter-spacing:.02em;text-transform:uppercase;
  animation:slideUp .8s .1s both;
}
.s2-stats{
  display:flex;gap:2rem;margin-top:1rem;
  animation:slideUp .7s .3s both;
}
.s2-stat{display:flex;flex-direction:column;gap:.2rem;}
.s2-stat-val{font-family:var(--head);font-size:1.8rem;font-weight:800;line-height:1;}
.s2-stat-lbl{font-family:var(--sub);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;opacity:.5;}

/* ── SLIDE 3: REGIÃO ── */
.s3-region-name{
  font-family:var(--head);
  font-size:clamp(3.5rem,14vw,7rem);
  line-height:.88;letter-spacing:.04em;text-transform:uppercase;
  animation:slideUp .8s .2s both;
}
.s3-region-desc{
  font-family:var(--body);font-style:italic;
  font-size:1rem;line-height:1.6;opacity:.65;
  max-width:340px;margin:1rem auto 0;
  animation:slideUp .7s .4s both;
}
.region-badge{
  display:inline-block;font-family:var(--sub);font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;
  padding:.3rem 1rem;border-radius:20px;border:1px solid currentColor;
  opacity:.6;margin-bottom:1rem;
  animation:slideUp .7s .05s both;
}

/* ── SLIDE 4: ESTILO ── */
.archetype-icon{font-size:4rem;margin-bottom:.8rem;animation:bounceIn .8s .1s both;}
@keyframes bounceIn{from{opacity:0;transform:scale(.3);}70%{transform:scale(1.1);}to{opacity:1;transform:scale(1);}}
.archetype-name{
  font-family:var(--head);
  font-size:clamp(2.8rem,11vw,5.5rem);
  line-height:.9;letter-spacing:.04em;text-transform:uppercase;
  animation:slideUp .7s .2s both;
}
.archetype-desc{
  font-family:var(--body);font-size:1rem;line-height:1.6;opacity:.65;
  max-width:340px;margin:.8rem auto 0;
  animation:slideUp .7s .4s both;
}

/* ── SLIDE 5: HORÁRIO ── */
.clock-wrap{
  position:relative;width:160px;height:160px;margin:0 auto 1.5rem;
  animation:clockIn .8s .1s both;
}
@keyframes clockIn{from{opacity:0;transform:rotate(-180deg) scale(.5);}to{opacity:1;transform:rotate(0) scale(1);}}
.clock-circle{
  width:100%;height:100%;border-radius:50%;
  border:2px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.clock-hour{
  font-family:var(--head);font-size:3.5rem;line-height:1;
}
.clock-label{font-family:var(--sub);font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;opacity:.5;margin-top:.2rem;}
.clock-dot{
  position:absolute;width:10px;height:10px;border-radius:50%;
  background:currentColor;
  top:50%;left:50%;
  transform-origin:0 0;
}

/* ── SLIDE 6: KDA ── */
.kda-wrap{
  display:flex;gap:0;margin:1.5rem auto 0;
  animation:slideUp .7s .3s both;
}
.kda-block{flex:1;text-align:center;padding:1rem;}
.kda-block:not(:last-child){border-right:1px solid rgba(255,255,255,.1);}
.kda-val{font-family:var(--head);font-size:clamp(2.5rem,10vw,4.5rem);line-height:1;}
.kda-lbl{font-family:var(--sub);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;opacity:.4;margin-top:.3rem;}

/* ── SLIDE 7: MÚSICA ── */
.music-wrap{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:1.5rem 2rem;
  max-width:380px;margin:1.5rem auto 0;
  display:flex;flex-direction:column;align-items:center;gap:.8rem;
  animation:slideUp .7s .3s both;
  backdrop-filter:blur(10px);
}
.music-note{font-size:2.5rem;}
.music-title{font-family:var(--head);font-size:1.8rem;letter-spacing:.04em;text-align:center;line-height:1.1;}
.music-artist{font-family:var(--sub);font-size:.85rem;opacity:.55;letter-spacing:.08em;}
.music-btn{
  display:inline-flex;align-items:center;gap:.5rem;
  background:#1DB954;border:none;border-radius:20px;
  color:#000;font-family:var(--sub);font-size:.82rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:.55rem 1.4rem;cursor:none;transition:opacity .15s;text-decoration:none;margin-top:.3rem;
  position:relative;z-index:200;pointer-events:auto !important;
}
.music-btn:hover{opacity:.85;}
.music-no-url{font-family:var(--sub);font-size:.78rem;opacity:.35;letter-spacing:.08em;text-transform:uppercase;margin-top:.3rem;}

/* ── SLIDE 8: FINAL ── */
#finalCard{
  position:relative;z-index:2;
  width:min(380px,90vw);
  background:linear-gradient(135deg,rgba(10,8,20,.95),rgba(5,4,12,.98));
  border:1px solid rgba(255,255,255,.1);
  border-radius:24px;overflow:visible;
  animation:slideUp .8s .2s both;
}
#finalCard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--final-accent,#e8c46d),transparent);
}
.fc-hero{
  position:relative;height:160px;overflow:hidden;
  border-radius:24px 24px 0 0;
}
.fc-hero-img{
  width:100%;height:100%;object-fit:cover;object-position:top center;
  filter:brightness(.35) saturate(.6);
}
.fc-hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 30%,rgba(10,8,20,.98) 100%);
}
.fc-hero-icon{
  display:block;
  width:52px;height:52px;border-radius:12px;
  border:2px solid rgba(255,255,255,.2);object-fit:cover;
  background:#111;
  box-shadow:0 4px 20px rgba(0,0,0,.6);
  margin:-26px auto 0;
  position:relative;z-index:10;
}
.fc-body{padding:1rem 1.5rem 1.5rem;}
.fc-name{
  font-family:var(--head);font-size:2rem;letter-spacing:.06em;
  text-align:center;color:#fff;line-height:1;margin-bottom:.2rem;
}
.fc-tag{font-family:var(--sub);font-size:.8rem;opacity:.35;text-align:center;margin-bottom:.8rem;}
.fc-region{
  display:flex;align-items:center;justify-content:center;gap:.4rem;
  font-family:var(--sub);font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;
  padding:.22rem .9rem;border-radius:20px;border:1px solid currentColor;
  width:fit-content;margin:0 auto .8rem;opacity:.7;
}
.fc-divider{height:1px;background:rgba(255,255,255,.06);margin:.8rem 0;}
.fc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem;}
.fc-stat{text-align:center;padding:.5rem .3rem;}
.fc-stat-val{font-family:var(--head);font-size:1.3rem;line-height:1;}
.fc-stat-lbl{font-family:var(--sub);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;opacity:.35;margin-top:.15rem;}
.fc-arch{
  font-family:var(--head);font-size:.95rem;letter-spacing:.04em;
  text-align:center;opacity:.5;margin-top:.7rem;
}
.fc-brand{
  font-family:var(--sub);font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;
  opacity:.2;text-align:center;margin-top:.5rem;
  padding-bottom:.2rem;
}

/* share buttons */
.share-row{
  display:flex;gap:.6rem;margin-top:1.2rem;justify-content:center;
  animation:slideUp .7s .5s both;
}
.share-btn{
  display:inline-flex;align-items:center;gap:.4rem;
  border:none;border-radius:12px;
  font-family:var(--sub);font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:.6rem 1.2rem;cursor:none;transition:opacity .15s,transform .1s;
  pointer-events:auto !important;
  position:relative;z-index:200;
}
.share-btn:active{transform:scale(.96);}
.share-btn-img{background:linear-gradient(135deg,#c8973a,#e8c46d);color:#050508;}
.share-btn-web{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;}
.share-btn-web:hover{background:rgba(255,255,255,.14);}
.share-loading{opacity:.5;pointer-events:none;}

/* ── THEME VARS per slide ── */
.theme-dark{color:#e8e0d0;}
.theme-light{color:#1a1a2e;}
.theme-void{color:#d0b8ff;}
.theme-freljord{color:#c8e8ff;}
.theme-noxus{color:#ffd8d0;}
.theme-ionia{color:#ffd8e8;}
.theme-shadow{color:#c0d8c0;}
</style>

const DDV = "14.24.1";
const CHAMP_FIX = {"Nunu e Willump":"Nunu","Nunu & Willump":"Nunu","Renata Glasc":"Renata","Wukong":"MonkeyKing","Bel'Veth":"Belveth","K'Sante":"KSante","Kog'Maw":"KogMaw","Kha'Zix":"Khazix","Rek'Sai":"RekSai","Cho'Gath":"Chogath","Vel'Koz":"Velkoz","Tahm Kench":"TahmKench","Lee Sin":"LeeSin","Master Yi":"MasterYi","Miss Fortune":"MissFortune","Twisted Fate":"TwistedFate","Xin Zhao":"XinZhao","Jarvan IV":"JarvanIV","Dr. Mundo":"DrMundo","Aurelion Sol":"AurelionSol","FiddleSticks":"Fiddlesticks", "LeBlanc": "Leblanc",};
function cf(n){return CHAMP_FIX[n]||n;}
function splashArt(n){return `https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${cf(n)}_0.jpg`;}
function iconImg(id){return `https://ddragon.leagueoflegends.com/cdn/${DDV}/img/profileicon/${id}.png`;}
function fmt(v,d=1){return v!=null?Number(v).toFixed(d):'—';}

function computeWrapped(data) {
  const {player, mastery, matches, analysis} = data;
  const top3 = (mastery||[]).slice(0,3).map(m=>m.champion_name);
  const o = analysis?.overall || {};

  // vote on theme, region, archetype from top3 champs
  const votes = {dark:0, light:0, neutral:0};
  const regionVotes = {};
  const archetypeVotes = {};
  top3.forEach(name => {
    const cd = CHAMP_DATA[name] || {theme:'neutral', region:'Runeterra', archetype:'O Guerreiro Implacável'};
    votes[cd.theme]++;
    regionVotes[cd.region] = (regionVotes[cd.region]||0)+1;
    archetypeVotes[cd.archetype] = (archetypeVotes[cd.archetype]||0)+1;
  });

  const theme = votes.dark>votes.light ? 'dark' : votes.light>votes.dark ? 'light' : 'neutral';
  const region = Object.entries(regionVotes).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'Runeterra';
  const archetype = Object.entries(archetypeVotes).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'O Guerreiro Implacável';

  const topChamp = top3[0] || 'Jinx';
  const regionCfg = REGION_CONFIG[region] || { emoji:'🌍', color:'#888', bg:'linear-gradient(135deg,#050508,#0a0a10)', desc:'Sua origem é um mistério.' };
  const archCfg = ARCHETYPE_CONFIG[archetype] || ARCHETYPE_CONFIG['O Guerreiro Implacável'];
  const music = MUSIC_CONFIG[archetype] || MUSIC_CONFIG['default'];

  // best hour
  const byHour = analysis?.by_hour || [];
  const bestH = [...byHour].filter(h=>h.games>=2).sort((a,b)=>b.winrate-a.winrate)[0];

  // total hours played estimate
  const avgMin = o.avg_game_duration_min || 28;
  const totalMatches = o.total_matches || (matches?.length || 0);
  const hoursPlayed = Math.round(totalMatches * avgMin / 60);

  return { player, top3, topChamp, theme, region, regionCfg, archetype, archCfg, music, bestH, o, totalMatches, hoursPlayed };
}

function buildSlides(w) {
  const {player, top3, topChamp, theme, region, regionCfg, archetype, archCfg, music, bestH, o, totalMatches, hoursPlayed} = w;

  const textColor = theme==='light' ? '#1a1020' : '#e8e0d0';
  const accentColor = theme==='light' ? regionCfg.color : '#e8c46d';

  const slides = [];

  // ── SLIDE 0: INTRO ──
  slides.push({
    id:'intro',
    html:`
      <div class="s0-bg" style="position:absolute;inset:0;background:radial-gradient(ellipse at center,#0a0815 0%,#020205 100%)"></div>
      <div class="stars" id="stars"></div>
      <div class="slide-content" style="position:relative;z-index:2">
        <div class="s0-hex">R</div>
        <div class="s0-name" style="color:#fff">${player.game_name}</div>
        <div class="s0-sub">Riftora Wrapped · 2026</div>
      </div>
      <div class="s0-hint">toque para começar</div>
    `,
    onEnter: () => {
      const s = document.getElementById('stars');
      if(!s||s.children.length>0) return;
      for(let i=0;i<80;i++){
        const p=document.createElement('div');
        p.className='star';
        const sz=Math.random()*2.5+.5;
        p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${-Math.random()*4}s;`;
        s.appendChild(p);
      }
    }
  });

  // ── SLIDE 1: PARTIDAS ──
  slides.push({
    id:'partidas',
    html:`
      <div class="slide-bg" style="background:${regionCfg.bg}"></div>
      <div class="slide-overlay" style="background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 60%)"></div>
      <div class="slide-content" style="color:${textColor}">
        <div class="tag-line" style="color:${accentColor}">suas partidas</div>
        <div class="big-number" style="color:#fff">${totalMatches}</div>
        <div class="subtitle">partidas jogadas</div>
        <div class="body-text">~<span class="highlight">${hoursPlayed} horas</span> na Rift. Quantas você ganhou?</div>
      </div>
    `
  });

  // ── SLIDE 2: CAMPEÃO ──
  const champData = CHAMP_DATA[topChamp] || {};
  const champColor = theme==='light' ? '#fff' : '#fff';
  const champBg = theme==='dark'
    ? 'linear-gradient(135deg,#050508 0%,#0d0d18 100%)'
    : `linear-gradient(135deg,#080510 0%,#120820 100%)`;
  slides.push({
    id:'campeao',
    html:`
      <div class="slide-bg" style="background:${champBg}"></div>
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 70% 50%,rgba(${theme==='dark'?'200,151,58':'180,100,200'},.08) 0%,transparent 70%)"></div>
      <img class="s2-champ-art" src="${splashArt(topChamp)}" alt="${topChamp}"
        onerror="this.style.opacity='.1'" style="opacity:.22"/>
      <div class="s2-content" style="color:#fff">
        <div class="s2-label" style="color:${accentColor}">seu campeão</div>
        <div class="s2-name">${topChamp}</div>
        <div class="s2-stats">
          <div class="s2-stat">
            <div class="s2-stat-val" style="color:${accentColor}">${fmt(o.avg_kda)}</div>
            <div class="s2-stat-lbl">KDA médio</div>
          </div>
          <div class="s2-stat">
            <div class="s2-stat-val" style="color:#fff">${o.winrate??0}%</div>
            <div class="s2-stat-lbl">winrate</div>
          </div>
          <div class="s2-stat">
            <div class="s2-stat-val" style="color:rgba(255,255,255,.5)">${top3[1]||'—'}</div>
            <div class="s2-stat-lbl">2º lugar</div>
          </div>
        </div>
      </div>
    `
  });

  // ── SLIDE 3: REGIÃO ──
  slides.push({
    id:'regiao',
    html:`
      <div class="slide-bg" style="background:${regionCfg.bg}"></div>
      <div class="slide-overlay" style="background:radial-gradient(ellipse at center,transparent 20%,rgba(0,0,0,.6) 100%)"></div>
      <div class="slide-content" style="color:#fff">
        <div class="tag-line" style="color:${regionCfg.color};opacity:.8">sua região</div>
        <div style="font-size:3.5rem;margin-bottom:.5rem;animation:bounceIn .8s .1s both">${regionCfg.emoji}</div>
        <div class="s3-region-name" style="color:#fff">${region}</div>
        <div class="s3-region-desc" style="color:rgba(255,255,255,.6)">${regionCfg.desc}</div>
      </div>
    `
  });

  // ── SLIDE 4: ARQUÉTIPO ──
  slides.push({
    id:'arquetipo',
    html:`
      <div class="slide-bg" style="background:radial-gradient(ellipse at center,#0f0a18 0%,#040208 100%)"></div>
      <div class="slide-overlay" style="background:radial-gradient(ellipse 70% 70% at 50% 50%,rgba(${theme==='dark'?'80,0,120':'200,160,0'},.06) 0%,transparent 70%)"></div>
      <div class="slide-content" style="color:#fff">
        <div class="tag-line" style="color:${accentColor}">seu estilo</div>
        <div class="archetype-icon">${archCfg.icon}</div>
        <div class="archetype-name" style="color:#fff">${archetype}</div>
        <div class="archetype-desc">${archCfg.desc}</div>
      </div>
    `
  });

  // ── SLIDE 5: HORÁRIO ──
  const hourVal = bestH ? bestH.hour : '—';
  const hourWR  = bestH ? bestH.winrate+'%' : '—';
  const hourPeriod = bestH
    ? bestH.hour >= 6 && bestH.hour < 12 ? 'da manhã'
    : bestH.hour >= 12 && bestH.hour < 18 ? 'da tarde'
    : bestH.hour >= 18 && bestH.hour < 24 ? 'da noite'
    : 'da madrugada'
    : '';
  slides.push({
    id:'horario',
    html:`
      <div class="slide-bg" style="background:radial-gradient(ellipse at center,#050510 0%,#01010a 100%)"></div>
      <div class="slide-content" style="color:#fff">
        <div class="tag-line" style="color:${accentColor}">quando você manda</div>
        <div class="clock-wrap">
          <div class="clock-circle" style="border-color:${accentColor}40">
            <div style="text-align:center">
              <div class="clock-hour" style="color:#fff">${hourVal}h</div>
              <div class="clock-label" style="color:${accentColor}">${hourPeriod}</div>
            </div>
          </div>
        </div>
        <div class="big-title" style="color:${accentColor};font-size:clamp(2rem,8vw,4rem)">${hourWR}</div>
        <div class="subtitle">winrate nesse horário</div>
        <div class="body-text">Às ${hourVal}h você é <span class="highlight">impossível de parar.</span></div>
      </div>
    `
  });

  // ── SLIDE 6: KDA ──
  slides.push({
    id:'kda',
    html:`
      <div class="slide-bg" style="background:radial-gradient(ellipse at center,#0a0508 0%,#020204 100%)"></div>
      <img style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.06;filter:blur(2px)"
        src="${splashArt(top3[1]||topChamp)}" alt=""/>
      <div class="slide-content" style="color:#fff">
        <div class="tag-line" style="color:${accentColor}">seu legado</div>
        <div class="big-title" style="color:#fff;margin-bottom:.5rem">${o.avg_kda??'—'}</div>
        <div class="subtitle" style="color:${accentColor}">KDA médio</div>
        <div class="kda-wrap" style="color:#fff;max-width:320px">
          <div class="kda-block">
            <div class="kda-val" style="color:var(--win,#3ecf7a)">${fmt(o.avg_kills)}</div>
            <div class="kda-lbl">abates</div>
          </div>
          <div class="kda-block">
            <div class="kda-val" style="color:#e05252">${fmt(o.avg_deaths)}</div>
            <div class="kda-lbl">mortes</div>
          </div>
          <div class="kda-block">
            <div class="kda-val" style="color:#3d9de8">${fmt(o.avg_assists)}</div>
            <div class="kda-lbl">assists</div>
          </div>
        </div>
      </div>
    `
  });

  // ── SLIDE 7: MÚSICA ──
  slides.push({
    id:'musica',
    html:`
      <div class="slide-bg" style="background:radial-gradient(ellipse at center,#080810 0%,#020205 100%)"></div>
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(29,185,84,.05) 0%,transparent 70%)"></div>
      <div class="slide-content" style="color:#fff">
        <div class="tag-line" style="color:${accentColor}">sua trilha sonora</div>
        <div class="big-title" style="color:#fff;font-size:clamp(1.8rem,6vw,3rem);margin-bottom:0">baseado no seu perfil</div>
        <div class="music-wrap">
          <div class="music-note">🎵</div>
          <div class="music-title">${music.title}</div>
          <div class="music-artist">${music.artist}</div>
          ${music.url
            ? `<a class="music-btn" href="${music.url}" target="_blank">▶ Ouvir no Spotify</a>`
            : `<div class="music-no-url">configure a música no código</div>`
          }
        </div>
        <div class="body-text" style="opacity:.4;font-size:.78rem">arquétipo: ${archetype}</div>
      </div>
    `
  });

  // ── SLIDE 8: FINAL ──
  slides.push({
    id:'final',
    html:`
      <div class="slide-bg" style="background:radial-gradient(ellipse at center,#06040f 0%,#010108 100%)"></div>
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse 70% 70% at 50% 40%,${regionCfg.color}06 0%,transparent 70%)"></div>

      <div style="position:relative;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:4rem 1.5rem 2rem;gap:0">

        <!-- CARD pra capturar como imagem -->
        <div id="finalCard" style="--final-accent:${regionCfg.color}">
          <!-- hero art -->
          <div class="fc-hero">
            <img class="fc-hero-img" src="${splashArt(topChamp)}" alt="${topChamp}" onerror="this.style.opacity=0"/>
            <div class="fc-hero-overlay"></div>
          </div>
          <!-- icon sits OUTSIDE fc-hero so it's not clipped -->
          <img class="fc-hero-icon" src="${iconImg(player.profile_icon_id)}" onerror="this.style.opacity=.1" alt="icon"/>

          <!-- body -->
          <div class="fc-body" style="color:#fff">
            <div class="fc-name">${player.game_name}</div>
            <div class="fc-tag">#${player.tag_line}</div>
            <div class="fc-region" style="color:${regionCfg.color};border-color:${regionCfg.color}40">
              ${regionCfg.emoji} ${region}
            </div>
            <div class="fc-divider"></div>
            <div class="fc-grid">
              <div class="fc-stat">
                <div class="fc-stat-val" style="color:#e8c46d">${totalMatches}</div>
                <div class="fc-stat-lbl">partidas</div>
              </div>
              <div class="fc-stat">
                <div class="fc-stat-val" style="color:#3ecf7a">${o.winrate??0}%</div>
                <div class="fc-stat-lbl">winrate</div>
              </div>
              <div class="fc-stat">
                <div class="fc-stat-val" style="color:#3d9de8">${o.avg_kda??'—'}</div>
                <div class="fc-stat-lbl">KDA</div>
              </div>
              <div class="fc-stat">
                <div class="fc-stat-val" style="color:rgba(255,255,255,.6)">${hoursPlayed}h</div>
                <div class="fc-stat-lbl">na rift</div>
              </div>
            </div>
            <div class="fc-arch">${archCfg.icon} ${archetype}</div>
            <div class="fc-brand">riftora wrapped · 2025</div>
          </div>
        </div>

        <!-- share buttons -->
        <div class="share-row">
          <button class="share-btn share-btn-img" id="btnShareImg">📸 Compartilhar</button>
          <button class="share-btn share-btn-web" id="btnShareLink">🔗 Link</button>
        </div>
      </div>
    `
  });

  return slides;
}

// ════════════════════════════════════════════════════
// SHARE FUNCTIONS
// ════════════════════════════════════════════════════

async function shareAsImage() {
  const card = document.getElementById('finalCard');
  if(!card) return;

  const btn = document.querySelector('.share-btn-img');
  if(btn) { btn.textContent = '⏳ Gerando...'; btn.classList.add('share-loading'); }

  try {
    // Hide cursor dot temporarily
    const dot = document.getElementById('cdot');
    if(dot) dot.style.display='none';

    const canvas = await html2canvas(card, {
      backgroundColor: null,
      scale: 2,
      useCORS: true,
      allowTaint: false,
      logging: false,
    });

    if(dot) dot.style.display='';

    canvas.toBlob(async (blob) => {
      const file = new File([blob], 'riftora-wrapped.png', { type: 'image/png' });

      // Try Web Share API with file (works on mobile)
      if(navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: 'Meu Riftora Wrapped',
            text: 'Veja meu Wrapped no Riftora!',
          });
        } catch(e) {
          if(e.name !== 'AbortError') fallbackDownload(canvas);
        }
      } else {
        // Fallback: download image
        fallbackDownload(canvas);
      }

      if(btn) { btn.textContent = '📸 Compartilhar'; btn.classList.remove('share-loading'); }
    }, 'image/png');

  } catch(e) {
    console.error('share error:', e);
    if(btn) { btn.textContent = '📸 Compartilhar'; btn.classList.remove('share-loading'); }
  }
}

function fallbackDownload(canvas) {
  const link = document.createElement('a');
  link.download = 'riftora-wrapped.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

async function shareLink() {
  const url = window.location.href;
  if(navigator.share) {
    try {
      await navigator.share({ title: 'Riftora Wrapped', url });
      return;
    } catch(e) {}
  }
  // fallback: copy to clipboard
  try {
    await navigator.clipboard.writeText(url);
    const btn = document.querySelector('.share-btn-web');
    if(btn) { btn.textContent = '✅ Copiado!'; setTimeout(()=>{ btn.textContent='🔗 Link'; },2000); }
  } catch(e) {}
}

// ════════════════════════════════════════════════════
// ENGINE
// ════════════════════════════════════════════════════
let currentSlide = 0;
let slides = [];
let progFills = [];

function goTo(idx) {
  if(idx < 0 || idx >= slides.length) return;
  const prev = currentSlide;
  currentSlide = idx;

  document.querySelectorAll('.slide').forEach((el, i) => {
    el.classList.remove('active','exit');
    if(i === idx) el.classList.add('active');
  });

  // progress
  progFills.forEach((f, i) => {
    f.classList.remove('active','done');
    if(i < idx) f.classList.add('done');
    if(i === idx) f.classList.add('active');
  });

  // onEnter callback
  if(slides[idx]?.onEnter) slides[idx].onEnter();
}

function next() { goTo(Math.min(currentSlide+1, slides.length-1)); }
function prev() { goTo(Math.max(currentSlide-1, 0)); }

// ════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  // cursor
  const dot = document.getElementById('cdot');
  document.addEventListener('mousemove', e => {
    dot.style.left = e.clientX+'px';
    dot.style.top  = e.clientY+'px';
  });

  // load data
  let data;
  try {
    const raw = sessionStorage.getItem('rd');
    if(!raw) { window.location.href='/search'; return; }
    data = JSON.parse(raw);
  } catch(e) { window.location.href='/search'; return; }

  const wrapped = computeWrapped(data);
  slides = buildSlides(wrapped);

  // build progress bar
  const pb = document.getElementById('progressBar');
  slides.forEach((_, i) => {
    const seg = document.createElement('div');
    seg.className = 'prog-seg';
    const fill = document.createElement('div');
    fill.className = 'prog-fill';
    seg.appendChild(fill);
    pb.appendChild(seg);
    progFills.push(fill);
  });

  // build slide elements
  const container = document.getElementById('slides');
  slides.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'slide';
    el.innerHTML = s.html;
    // click zones
    const prev = document.createElement('div');
    prev.className = 'click-prev';
    prev.addEventListener('click', e => { e.stopPropagation(); goTo(currentSlide-1); });
    const next = document.createElement('div');
    next.className = 'click-next';
    next.addEventListener('click', e => { e.stopPropagation(); goTo(currentSlide+1); });
    el.appendChild(prev);
    el.appendChild(next);
    container.appendChild(el);
  });

  // keyboard
  document.addEventListener('keydown', e => {
    if(e.key === 'ArrowRight' || e.key === ' ') next();
    if(e.key === 'ArrowLeft') prev();
  });

  // touch swipe
  let touchX = 0;
  document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchX;
    if(Math.abs(dx) > 40) { dx < 0 ? next() : prev(); }
  });

  goTo(0);

  // Bind share buttons via event delegation (works even when rendered dynamically)
  document.addEventListener('click', e => {
    const imgBtn = e.target.closest('#btnShareImg');
    const linkBtn = e.target.closest('#btnShareLink');
    if(imgBtn) { e.stopPropagation(); shareAsImage(); }
    if(linkBtn) { e.stopPropagation(); shareLink(); }
    // Music button - let <a> tags work naturally
    const musicBtn = e.target.closest('.music-btn');
    if(musicBtn) { e.stopPropagation(); }
  }, true); // capture phase = fires before click-next
});
</script>
