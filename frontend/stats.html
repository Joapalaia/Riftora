<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Riftora · Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
* { cursor: none !important; }
:root{
  --bg:#070910;--panel:#0c0f1a;--card:#101422;--border:#1a2030;--border2:#222d42;
  --gold:#c8973a;--gold2:#e8b86d;--gold-glow:rgba(200,151,58,.15);
  --blue:#3d9de8;--win:#3ecf7a;--win-dim:rgba(62,207,122,.1);
  --loss:#e05252;--loss-dim:rgba(224,82,82,.1);
  --text:#d4c9b0;--text2:#9aa4b6;--text3:#5a6880;
  --head:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:17px;min-height:100vh;overflow-x:hidden;cursor:none;}

#cdot{
  position:fixed;width:18px;height:18px;
  background:var(--gold);border-radius:50%;
  pointer-events:none;z-index:99999;
  transform:translate(-50%,-50%);
  mix-blend-mode:screen;
  box-shadow:0 0 8px rgba(200,151,58,.8);
}
#cglow{position:fixed;width:320px;height:320px;border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(200,151,58,.065) 0%,rgba(61,157,232,.025) 45%,transparent 70%);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:.5;}

/* ── PARTIDAS ANALISADAS BANNER ── */
.analyzed-banner{
  background:linear-gradient(135deg,rgba(200,151,58,.08),rgba(200,151,58,.04));
  border:1px solid rgba(200,151,58,.2);
  border-radius:12px;
  padding:1.1rem 1.5rem;
  margin-bottom:1.5rem;
  display:flex;align-items:center;gap:1rem;
  position:relative;overflow:hidden;
}
.analyzed-banner::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4;
}
.analyzed-num{
  font-family:var(--head);font-size:3rem;font-weight:900;
  line-height:1;color:var(--gold);letter-spacing:-.02em;
  flex-shrink:0;
}
.analyzed-info{flex:1;}
.analyzed-label{
  font-family:var(--head);font-size:1rem;letter-spacing:.14em;
  text-transform:uppercase;color:var(--text);
}
.analyzed-sub{font-size:.8rem;color:var(--text2);margin-top:.15rem;}

/* ── TEAM SIDE ── */
.side-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:1.3rem;}
.side-card{
  border-radius:12px;padding:1.3rem 1.2rem;
  display:flex;align-items:center;gap:1rem;
  position:relative;overflow:hidden;
}
.side-card.blue{background:rgba(61,157,232,.08);border:1px solid rgba(61,157,232,.2);}
.side-card.red{background:rgba(224,82,82,.08);border:1px solid rgba(224,82,82,.2);}
.side-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.side-card.blue .side-dot{background:var(--blue);box-shadow:0 0 8px rgba(61,157,232,.5);}
.side-card.red  .side-dot{background:var(--loss);box-shadow:0 0 8px rgba(224,82,82,.5);}
.side-info{flex:1;}
.side-name{font-family:var(--head);font-size:1.2rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;}
.side-card.blue .side-name{color:var(--blue);}
.side-card.red  .side-name{color:var(--loss);}
.side-stats{font-size:.8rem;color:var(--text2);margin-top:.15rem;}
.side-wr{font-family:var(--head);font-size:1.8rem;font-weight:800;flex-shrink:0;}
.side-card.blue .side-wr{color:var(--blue);}
.side-card.red  .side-wr{color:var(--loss);}

/* ── DURATION ── */
.dur-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.9rem;margin-bottom:1.3rem;}
.dur-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1.1rem;text-align:center;}
.dur-label{font-family:var(--head);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:.35rem;}
.dur-wr{font-family:var(--head);font-size:1.8rem;font-weight:800;}
.dur-sub{font-size:.78rem;color:var(--text2);margin-top:.2rem;}

/* ── CONSISTENCY ── */
.consist-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.3rem;}
.consist-item{
  background:var(--panel);border:1px solid var(--border);border-radius:10px;
  padding:.8rem 1rem;
  display:grid;grid-template-columns:44px 1fr auto auto;align-items:center;gap:.85rem;
}
.consist-img{width:44px;height:44px;border-radius:7px;object-fit:cover;border:1px solid var(--border2);background:var(--border);}
.consist-name{font-family:var(--head);font-size:1rem;font-weight:700;letter-spacing:.02em;}
.consist-games{font-size:.78rem;color:var(--text2);}
.consist-kda{font-family:var(--head);font-size:1rem;color:var(--blue);text-align:right;}
.consist-std{font-size:.75rem;color:var(--text3);margin-top:.1rem;text-align:right;}

/* ── FARM EFF ── */
.farm-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.8rem;margin-bottom:1.3rem;}
.farm-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:.9rem 1rem;display:flex;align-items:center;gap:.75rem;}
.farm-img{width:40px;height:40px;border-radius:7px;object-fit:cover;border:1px solid var(--border2);background:var(--border);flex-shrink:0;}
.farm-name{font-family:var(--head);font-size:.95rem;font-weight:700;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.farm-val{font-family:var(--head);font-size:1rem;color:var(--win);font-weight:800;margin-top:.1rem;}
.farm-sub{font-size:.7rem;color:var(--text2);}

/* ── BEST HOUR CALLOUT ── */
.best-hour-card{
  background:rgba(62,207,122,.06);border:1px solid rgba(62,207,122,.15);
  border-radius:12px;padding:1.1rem 1.4rem;margin-bottom:1.3rem;
  display:flex;align-items:center;gap:1.2rem;
}
.bh-icon{font-size:2rem;}
.bh-info{flex:1;}
.bh-title{font-family:var(--head);font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:.2rem;}
.bh-hour{font-family:var(--head);font-size:1.6rem;font-weight:800;color:var(--win);letter-spacing:.04em;}
.bh-sub{font-size:.8rem;color:var(--text2);margin-top:.1rem;}
.bh-wr{font-family:var(--head);font-size:2rem;font-weight:800;color:var(--win);flex-shrink:0;}

/* ── KP CARD ── */
.kp-card{
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:1.15rem 1.1rem;
}

/* ── STREAK MAX ── */
.streak-max-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:1.3rem;}
.streak-max-card{
  border-radius:12px;padding:1.1rem 1.2rem;text-align:center;
}
.streak-max-card.wins{background:var(--win-dim);border:1px solid rgba(62,207,122,.2);}
.streak-max-card.losses{background:var(--loss-dim);border:1px solid rgba(224,82,82,.2);}
.streak-max-num{font-family:var(--head);font-size:3.5rem;font-weight:900;line-height:1;}
.streak-max-card.wins .streak-max-num{color:var(--win);}
.streak-max-card.losses .streak-max-num{color:var(--loss);}
.streak-max-lbl{font-family:var(--head);font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);margin-top:.3rem;}

/* ── LAYOUT ── */
.proot{display:block;min-height:100vh;}

/* sidebar removed */

/* main */
.mcont{padding:2rem 2.5rem 5rem;max-width:960px;width:100%;margin:0 auto;}

/* nav */
.nbar{display:flex;align-items:center;gap:1rem;margin-bottom:2rem;}
.bbtn{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:var(--head);font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;padding:.45rem .9rem;cursor:none;transition:all .15s;text-decoration:none;}
.bbtn:hover{border-color:var(--gold);color:var(--gold);}
.ncrumb{font-family:var(--head);font-size:.86rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.ncrumb b{color:var(--gold);}

/* hero */
.hero{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:1.75rem 2rem;margin-bottom:1.25rem;display:grid;grid-template-columns:auto 1fr auto;gap:1.5rem;align-items:center;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold) 40%,var(--gold2) 60%,transparent);}
.hero::before{content:'';position:absolute;right:-40px;top:-40px;width:220px;height:220px;background:radial-gradient(circle,rgba(200,151,58,.06) 0%,transparent 70%);pointer-events:none;}
.icw{position:relative;}
.icimg{width:84px;height:84px;border-radius:12px;border:2px solid var(--border2);object-fit:cover;display:block;background:var(--border);}
.iclv{position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);background:var(--gold);color:#060810;font-family:var(--head);font-size:.65rem;font-weight:800;padding:2px 8px;border-radius:20px;white-space:nowrap;letter-spacing:.04em;}
.hname{font-family:var(--head);font-size:clamp(1.5rem,3vw,2.2rem);font-weight:900;letter-spacing:.02em;text-transform:uppercase;line-height:1;margin-bottom:.3rem;}
.htag{font-size:.82rem;color:var(--text2);}.htag b{color:var(--gold);}
.stk{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .65rem;border-radius:6px;font-family:var(--head);font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-top:.35rem;}
.stk.win{background:var(--win-dim);color:var(--win);border:1px solid rgba(62,207,122,.2);}
.stk.loss{background:var(--loss-dim);color:var(--loss);border:1px solid rgba(224,82,82,.2);}
.rblock{text-align:right;}
.rtier{font-family:var(--head);font-size:1.8rem;font-weight:900;letter-spacing:.04em;text-transform:uppercase;line-height:1;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.rlp{font-size:.82rem;color:var(--text2);margin-top:.2rem;}
.rrec{font-size:.78rem;color:var(--text2);margin-top:.12rem;}
.tpill{display:inline-flex;align-items:center;gap:.3rem;padding:.22rem .75rem;border-radius:99px;font-family:var(--head);font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-top:.4rem;}
.tpill.improving{background:var(--win-dim);color:var(--win);}
.tpill.declining{background:var(--loss-dim);color:var(--loss);}
.tpill.stable{background:rgba(61,157,232,.1);color:var(--blue);}

/* stat grid */
.srow{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:.9rem;margin-bottom:1.3rem;}
.scard{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1.15rem 1.1rem;}
.slbl{font-family:var(--head);font-size:.76rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:.3rem;}
.sval{font-family:var(--head);font-size:2rem;font-weight:800;letter-spacing:-.01em;line-height:1;}
.ssub{font-size:.82rem;color:var(--text2);margin-top:.22rem;}
.c-gold{color:var(--gold);}.c-blue{color:var(--blue);}.c-win{color:var(--win);}.c-loss{color:var(--loss);}.c-txt{color:var(--text);}
.wrbar{height:3px;background:var(--border);border-radius:99px;margin-top:.5rem;overflow:hidden;}
.wrfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--win),#6de8a4);transition:width 1s cubic-bezier(.4,0,.2,1);}

/* damage bar — dual */
.dmg-bar-wrap{height:6px;background:var(--border);border-radius:3px;margin-top:.5rem;overflow:hidden;display:flex;}
.dmg-dealt{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:3px 0 0 3px;transition:width 1s;}
.dmg-taken{height:100%;background:linear-gradient(90deg,var(--loss),#ff8080);border-radius:0 3px 3px 0;transition:width 1s;}

/* section */
.sec{display:flex;align-items:center;gap:.6rem;margin-bottom:.9rem;}
.sttl{font-family:var(--head);font-size:.82rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);}
.sline{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}

/* champ grid */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:.8rem;margin-bottom:1.3rem;}
.ccard{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:.88rem 1rem;display:flex;align-items:center;gap:.85rem;transition:border-color .2s,background .2s;}
.ccard:hover{border-color:var(--border2);background:var(--card);}
.cimg{width:48px;height:48px;border-radius:8px;object-fit:cover;border:1px solid var(--border2);background:var(--border);flex-shrink:0;}
.cinfo{flex:1;min-width:0;}
.cname{font-family:var(--head);font-size:1.1rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.15rem;letter-spacing:.02em;}
.cmeta{font-size:.82rem;color:var(--text2);display:flex;gap:.6rem;flex-wrap:wrap;}
.ckda{color:var(--blue);font-weight:600;}
.cwr{font-family:var(--head);font-size:1.05rem;font-weight:800;flex-shrink:0;}

/* role grid */
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:.8rem;margin-bottom:1.3rem;}
.rcard{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1rem;}
.rname{font-family:var(--head);font-size:1.1rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;margin-bottom:.4rem;}
.rstats{display:flex;flex-direction:column;gap:.18rem;font-size:.82rem;color:var(--text2);}

/* objectives grid */
.obj-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem;margin-bottom:1.3rem;}
.obj-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center;}
.obj-icon{font-size:1.6rem;margin-bottom:.4rem;}
.obj-val{font-family:var(--head);font-size:1.5rem;font-weight:800;color:var(--gold);}
.obj-lbl{font-size:.72rem;color:var(--text3);margin-top:.15rem;font-family:var(--head);letter-spacing:.08em;text-transform:uppercase;}

/* evo */
.erow{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:1.3rem;}
.eblk{flex:1;min-width:90px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:.8rem;text-align:center;}
.erng{font-size:.68rem;color:var(--text2);margin-bottom:.3rem;font-family:var(--head);letter-spacing:.08em;text-transform:uppercase;}
.ewr{font-family:var(--head);font-size:1.2rem;font-weight:800;}
.esub{font-size:.72rem;color:var(--text2);margin-top:.12rem;}

/* hour chart */
.hchart{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1rem 1rem;margin-bottom:1.3rem;overflow-x:auto;}
.hbars{display:flex;align-items:flex-end;gap:3px;height:80px;min-width:480px;}
.hbw{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.hbar{width:100%;border-radius:3px 3px 0 0;transition:opacity .2s;min-height:3px;}.hbar:hover{opacity:.7;}
.hlbl{font-family:var(--head);font-size:.62rem;color:var(--text3);white-space:nowrap;transform:rotate(-45deg);}

/* match list */
.mlist{display:flex;flex-direction:column;gap:.55rem;}
.mcard{background:var(--panel);border:1px solid var(--border);border-left:3px solid transparent;border-radius:12px;padding:.88rem 1.1rem;display:grid;grid-template-columns:50px 1fr auto auto;align-items:center;gap:.9rem;transition:background .15s;}
.mcard:hover{background:var(--card);}
.mcard.win{border-left-color:var(--win);}.mcard.loss{border-left-color:var(--loss);}
.mic{width:50px;height:50px;border-radius:8px;object-fit:cover;border:1px solid var(--border2);background:var(--border);}
.mch{font-family:var(--head);font-size:1.05rem;font-weight:700;letter-spacing:.02em;margin-bottom:.1rem;}
.minf{font-size:.82rem;color:var(--text2);}
.mitems{display:flex;gap:.25rem;flex-wrap:wrap;margin-top:.35rem;}
.iic{width:26px;height:26px;border-radius:5px;object-fit:cover;border:1px solid var(--border2);background:var(--border);}
.iemp{width:26px;height:26px;border-radius:5px;background:var(--border);opacity:.3;}
.rrow{display:flex;gap:.3rem;align-items:center;flex-wrap:wrap;margin-top:.28rem;}
.ric{width:20px;height:20px;border-radius:50%;object-fit:cover;background:var(--border);border:1px solid var(--border2);}
.kdab{text-align:center;}
.kdas{font-family:var(--head);font-size:.92rem;font-weight:700;}
.kdar{font-size:.76rem;color:var(--blue);margin-top:.1rem;}
.mres{font-family:var(--head);font-size:.74rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;text-align:right;min-width:48px;}
.mres.win{color:var(--win);}.mres.loss{color:var(--loss);}
.rbadge{display:inline-block;padding:.12rem .45rem;border-radius:4px;font-family:var(--head);font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:rgba(61,157,232,.1);color:var(--blue);border:1px solid rgba(61,157,232,.2);margin-left:.4rem;}

/* reveal */
.rev{opacity:0;transform:translateY(22px);transition:opacity .5s cubic-bezier(.2,.8,.3,1),transform .5s cubic-bezier(.2,.8,.3,1);}
.rev.vis{opacity:1;transform:translateY(0);}
.rev.hide{opacity:0;transform:translateY(-12px);transition:opacity .35s ease,transform .35s ease;}

@media(max-width:960px){.mcont{padding:1.5rem 1rem 4rem;}}
@media(max-width:640px){.hero{grid-template-columns:auto 1fr;}.rblock{grid-column:span 2;text-align:left;}.mcard{grid-template-columns:44px 1fr auto;}.kdab{display:none;}.obj-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div id="cdot"></div><div id="cglow"></div>
<div id="root" class="proot"></div>

<script>
const dot=document.getElementById('cdot'),glow=document.getElementById('cglow');
document.addEventListener('mousemove',e=>{
  dot.style.left=e.clientX+'px';dot.style.top=e.clientY+'px';
  glow.style.left=e.clientX+'px';glow.style.top=e.clientY+'px';
});

let DDV = "16.5.1"; // fallback temporário
fetch("https://riftora-backend.onrender.com/version")
  .then(r => r.json())
  .then(d => { DDV = d.version; })
  .catch(() => {});
const ROLE_MAP={'TOP':'Top','JUNGLE':'Jungle','MIDDLE':'Mid','BOTTOM':'ADC','UTILITY':'Suporte','NONE':'?','UNKNOWN':'?','':'?'};
function roleLabel(r){return ROLE_MAP[r]||r;}
const CHAMP_FIX={"Nunu e Willump":"Nunu","Nunu & Willump":"Nunu","Renata Glasc":"Renata","Wukong":"MonkeyKing","Bel'Veth":"Belveth","K'Sante":"KSante","Kog'Maw":"KogMaw","Kha'Zix":"Khazix","Rek'Sai":"RekSai","Cho'Gath":"Chogath","Vel'Koz":"Velkoz","Tahm Kench":"TahmKench","Lee Sin":"LeeSin","Master Yi":"MasterYi","Miss Fortune":"MissFortune","Twisted Fate":"TwistedFate","Xin Zhao":"XinZhao","Jarvan IV":"JarvanIV","Dr. Mundo":"DrMundo","Aurelion Sol":"AurelionSol","FiddleSticks":"Fiddlesticks", "LeBlanc": "Leblanc",};
function cf(n){return CHAMP_FIX[n]||n;}
function ci(n){return `assets/champions/${cf(n)}.png`;}
function cif(n){return `https://ddragon.leagueoflegends.com/cdn/${DDV}/img/champion/${cf(n)}.png`;}
function ii(id){return `https://ddragon.leagueoflegends.com/cdn/${DDV}/img/profileicon/${id}.png`;}
function itm(id){return `assets/items/${id}.png`;}
function itmf(id){return `https://ddragon.leagueoflegends.com/cdn/${DDV}/img/item/${id}.png`;}

// rune loading
const RUNE_IMG={};
async function loadRunes(){
  try{
    const vRes=await fetch("https://ddragon.leagueoflegends.com/api/versions.json");
    const versions=await vRes.json();
    const v=versions[0];
    const [en,pt]=await Promise.all([
      fetch(`https://ddragon.leagueoflegends.com/cdn/${v}/data/en_US/runesReforged.json`).then(r=>r.json()),
      fetch(`https://ddragon.leagueoflegends.com/cdn/${v}/data/pt_BR/runesReforged.json`).then(r=>r.json()),
    ]);
    pt.forEach((tp,ti)=>{
      RUNE_IMG[tp.name]=`https://ddragon.leagueoflegends.com/cdn/img/${en[ti].icon}`;
      tp.slots.forEach((sp,si)=>sp.runes.forEach((rp,ri)=>{

}

// reveal observer
const obs=new IntersectionObserver(es=>{
  es.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.remove('hide');
      e.target.classList.add('vis');
    } else if(e.target.classList.contains('vis')){
      e.target.classList.add('hide');
      e.target.classList.remove('vis');
    }
  });
},{threshold:0.08,rootMargin:'0px 0px -40px 0px'});
function revObs(root){root.querySelectorAll('.rev').forEach(el=>obs.observe(el));}

function fmt(v,dec=1){return v!=null?Number(v).toFixed(dec):'—';}
function fmtK(v){return v!=null?Math.round(v/1000)+'k':'—';}

function renderSidebar(mastery){
  const top20=(mastery||[]).slice(0,20);
  const maxPts=top20[0]?.mastery_points||1;
  let h=`<div class="stitle">Top 20 Maestria</div>`;
  top20.forEach((m,i)=>{
    const w=(m.mastery_points/maxPts*100).toFixed(1);
    h+=`<div class="mi">
      <div class="mrank">${i+1}</div>
      <img class="mimg" src="${ci(m.champion_name)}" onerror="this.src='${cif(m.champion_name)}'" alt="${m.champion_name}"/>
      <div class="mrow">

        <div class="mmeta"><b>M${m.mastery_level}</b> · ${(m.mastery_points/1000).toFixed(0)}k</div>
      </div>
      <div class="mbar" style="width:${w}%"></div>
    </div>`;
  });
  return h;
}

  if(mlist&&matches?.length){
    runePromise.then(()=>{
      matches.forEach((m,i)=>{
        const kda=m.deaths===0?'Perfect':((m.kills+m.assists)/m.deaths).toFixed(2);
        const dur=m.time_played?`${Math.floor(m.time_played/60)}:${String(m.time_played%60).padStart(2,'0')}`:'—';
        const res=m.win?'win':'loss';
        const items=Array.isArray(m.items)?m.items:[];
        const runes=m.runes||{};
        const div=document.createElement('div');
        div.className=`mcard ${res} rev`;
        div.style.transitionDelay=`${i*.025}s`;
        div.innerHTML=`
          <img class="mic" src="${ci(m.champion_name)}" onerror="this.src='${cif(m.champion_name)}'" alt="${m.champion_name}"/>
          <div>
            <div class="mch">${m.champion_name}${m.role?`<span class="rbadge">${m.role}</span>`:''}</div>
            <div class="minf">${dur} · ${m.cs_total} CS · ${m.damage_dealt?fmtK(m.damage_dealt)+' dano':'—'}</div>
            <div class="mitems">${items.slice(0,6).map((it,j)=>it?`<img class="iic" src="${itm(it.id)}" onerror="this.src='${itmf(it.id)}'" alt="${it.name}" title="${it.name}"/>`:`<div class="iemp"></div>`).join('')}</div>
            ${runes.primary_perks?`<div class="rrow">
              ${runes.primary_perks.slice(0,1).map(rn=>rn&&rn!=='Unknown'&&RUNE_IMG[rn]?`<img class="ric" src="${RUNE_IMG[rn]}" alt="${rn}" title="${rn}" onerror="this.style.opacity=.2"/>`:``).join('')}
              <span style="font-size:.72rem;color:var(--text2)">${runes.primary_style} · ${runes.secondary_style}</span>
            </div>`:''}
          </div>
          <div class="kdab"><div class="kdas">${m.kills}/${m.deaths}/${m.assists}</div><div class="kdar">${kda} KDA</div></div>
          <div class="mres ${res}">${m.win?'Vitória':'Derrota'}</div>
        `;
        mlist.appendChild(div);
        obs.observe(div);
      });
    });
  }

  // trigger reveal on existing elements
  revObs(document.getElementById('mcont'));
}

window.addEventListener('DOMContentLoaded',()=>{
  try{
    const raw=sessionStorage.getItem('rd');
    if(!raw){window.location.href='/search';return;}
    renderPage(JSON.parse(raw));
  }catch(e){console.error(e);window.location.href='/search';}
});
</script>
